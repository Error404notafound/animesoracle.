<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimesOracle</title>
    
    <!-- BIBLIOTECAS FIREBASE (VERSÃO ESTÁVEL 8.10.0) -->
    <!-- Essencial para o Firebase funcionar -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Para o banco de dados Firestore -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <!-- Para autenticação de usuários (e-mail/senha) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        /* Estilos Globais e do Tema */
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --primary: #6200ea; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }

        /* Estilos do Header */
        header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            background: #000; 
            height: 60px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333; 
        }
        .logo { 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 20px; 
            flex-grow: 1; 
            text-align: center; 
        }
        .icon-btn { 
            font-size: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: var(--primary); 
            outline: none; 
            padding: 0 5px; /* Adicionado para melhor toque */
        }

        /* Estilos da Grade de Animes */
        .grid-recent { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 15px; 
        }
        .card-recent { 
            background: var(--card); 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #333; 
            text-align: center; 
        }
        .card-recent img { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            cursor: pointer; 
            display: block; 
        }
        .card-info { 
            padding: 8px; 
            font-size: 13px; 
            font-weight: bold; 
        }

        /* Estilos Comuns para Modais (pop-ups) */
        .modal { 
            display: none; /* Escondido por padrão */
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 5000; 
            justify-content: center; 
            align-items: center; 
        }
        .modal-card { 
            background: #1a1a1a; 
            padding: 25px; 
            border-radius: 15px; 
            width: 85%; 
            max-width: 400px; 
            border: 1px solid var(--primary); 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #222; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 5px; 
            box-sizing: border-box; 
        }
        .btn-post { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
        }

        /* Estilos Específicos para o Menu do Usuário (Sidebar) */
        #userMenu {
            justify-content: flex-start; /* Alinha o menu à esquerda da tela */
            align-items: stretch; /* Ocupa toda a altura */
            background: rgba(0,0,0,0.7); /* Fundo um pouco mais transparente para o menu */
        }
        #userMenu .modal-card {
            width: 280px; /* Largura da sidebar */
            max-width: 80%; /* Para telas menores, não ultrapassa 80% da largura */
            height: 100%; /* Ocupa a altura total da tela */
            border-radius: 0 15px 15px 0; /* Bordas arredondadas apenas na direita */
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); /* Sombra para dar profundidade */
            display: flex;
            flex-direction: column; /* Organiza os itens verticalmente */
            overflow-y: auto; /* Adiciona rolagem se o conteúdo for muito grande */
            position: relative; /* Para posicionar o botão de fechar */
        }
        #userMenu .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            position: absolute; /* Posição absoluta dentro do modal-card */
            right: 15px;
            top: 10px;
            z-index: 5001; /* Garante que o botão esteja acima de outros elementos */
        }
        #userInfoDisplay {
            text-align: center; 
            margin-top: 30px; /* Espaço para o botão de fechar */
        }
        #userInfoDisplay img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 2px solid var(--primary); /* Borda roxa ao redor da foto */
        }
        #userInfoDisplay p {
            margin: 8px 0;
            padding: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease; /* Efeito suave ao passar o mouse */
        }
        #userInfoDisplay p:hover {
            background-color: #2a2a2a; /* Fundo mais escuro ao passar o mouse */
            border-radius: 5px;
        }
        #userInfoDisplay .menu-item-white {
            color: white;
        }
        #userInfoDisplay .menu-item-primary {
            color: var(--primary); /* Texto roxo para "Animes Salvos" */
            font-weight: bold;
        }
        #userInfoDisplay .menu-item-adult {
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <!-- Botão do hambúrguer que agora abre o menu do usuário -->
    <button class="icon-btn" onclick="abrirMenuUsuario()">☰</button>
    <div class="logo">AnimesOracle</div>
    <!-- Botão de adicionar anime (permanece o mesmo) -->
    <button class="icon-btn" onclick="document.getElementById('postarModal').style.display='flex'">➕</button>
</header>

<div class="grid-recent" id="animeGrid"></div>

<!-- Modal para Postar Anime (EXISTENTE) -->
<div id="postarModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin:0 0 10px 0;">Postar Anime</h3>
        <input type="text" id="pNome" placeholder="Nome do Anime">
        <input type="text" id="pCapa" placeholder="Link da Imagem (Capa)">
        <input type="text" id="pLink" placeholder="Link do Vídeo">
        <button class="btn-post" onclick="salvarAnime()">PUBLICAR</button>
        <button onclick="document.getElementById('postarModal').style.display='none'" style="background:none; color:gray; border:none; margin-top:15px; width:100%; cursor:pointer;">Cancelar</button>
    </div>
</div>

<!-- Modal de Autenticação (Login/Cadastro) -->
<div id="authModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin:0 0 10px 0;">Entrar / Cadastrar</h3>
        <input type="email" id="authEmail" placeholder="E-mail">
        <input type="password" id="authPassword" placeholder="Senha">
        <button class="btn-post" onclick="cadastrarUsuario()">CADASTRAR</button>
        <button class="btn-post" onclick="loginUsuario()" style="margin-top: 10px;">ENTRAR</button>
        <button onclick="document.getElementById('authModal').style.display='none'" style="background:none; color:gray; border:none; margin-top:15px; width:100%; cursor:pointer;">Cancelar</button>
    </div>
</div>

<!-- Menu do Usuário (Sidebar) -->
<div id="userMenu" class="modal">
    <div class="modal-card">
        <button class="close-btn" onclick="document.getElementById('userMenu').style.display='none'">&times;</button>
        <div id="userInfoDisplay">
            <!-- Conteúdo do usuário será carregado aqui pelo JavaScript -->
        </div>
        <hr style="border-color:#333; margin:15px 0;">
        <button onclick="logoutUsuario()" class="btn-post" style="background:#cc0000;">Sair</button>
    </div>
</div>

<script>
    // 1. CONFIGURAÇÃO DO FIREBASE (SEUS DADOS DE PROJETO)
    const firebaseConfig = { 
      apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw", 
      authDomain: "animesoracle-a60e9.firebaseapp.com", 
      projectId: "animesoracle-a60e9", 
      storageBucket: "animesoracle-a60e9.firebasestorage.app", 
      messagingSenderId: "751657326717", 
      appId: "1:751657326717:web:67ef63d01ffa3ad044f914" 
    };

    // 2. INICIALIZAÇÃO DO FIREBASE
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth(); // Inicializa o Firebase Auth

    // 3. FUNÇÃO SALVAR ANIME (PARA O BOTÃO "+")
    async function salvarAnime() {
        const nome = document.getElementById('pNome').value;
        const capa = document.getElementById('pCapa').value;
        const link = document.getElementById('pLink').value;

        // Se o usuário não estiver logado, impede a postagem
        if (!auth.currentUser) {
            alert("Você precisa estar logado para postar animes!");
            return;
        }

        if (!nome || !capa) {
            alert("Preencha pelo menos Nome e Capa!");
            return; 
        }

        try {
            await db.collection("animes").add({
                nome: nome,
                capa: capa,
                link: link,
                data: firebase.firestore.FieldValue.serverTimestamp(),
                postedBy: auth.currentUser.uid // Salva quem postou o anime
            });
            alert("Sucesso! Anime postado.");
            document.getElementById('postarModal').style.display = 'none';
            document.getElementById('pNome').value = "";
            document.getElementById('pCapa').value = "";
            document.getElementById('pLink').value = "";
        } catch (e) {
            console.error("Erro ao salvar:", e); 
            alert("Erro do Firebase: " + e.message + "\n\nVerifique as 'Regras' no Firebase!");
        }
    }

    // 4. LÓGICA DE AUTENTICAÇÃO (LOGIN/CADASTRO/LOGOUT)
    async function cadastrarUsuario() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;

        if (!email || !password) {
            alert("Por favor, preencha E-mail e Senha para cadastro.");
            return;
        }

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            // Cria um documento no Firestore para o novo usuário com dados padrão
            await db.collection("users").doc(userCredential.user.uid).set({
                email: email,
                photoURL: 'https://via.placeholder.com/60?text=AP', // Imagem padrão, "AP" de AnimesOracle
                animesSalvos: [],
                modoAdulto: false
            });
            alert("Cadastro realizado com sucesso!");
            document.getElementById('authModal').style.display = 'none';
        } catch (error) {
            console.error("Erro ao cadastrar:", error);
            alert("Erro ao cadastrar: " + error.message);
        }
    }

    async function loginUsuario() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;

        if (!email || !password) {
            alert("Por favor, preencha E-mail e Senha para entrar.");
            return;
        }

        try {
            await auth.signInWithEmailAndPassword(email, password);
            alert("Login realizado com sucesso!");
            document.getElementById('authModal').style.display = 'none';
        } catch (error) {
            console.error("Erro ao fazer login:", error);
            alert("Erro ao fazer login: " + error.message);
        }
    }

    async function logoutUsuario() {
        try {
            await auth.signOut();
            alert("Você foi desconectado.");
            document.getElementById('userMenu').style.display = 'none'; // Fecha o menu
        } catch (error) {
            console.error("Erro ao fazer logout:", error);
            alert("Erro ao fazer logout: " + error.message);
        }
    }

    //Sem resposta
