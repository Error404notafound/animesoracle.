<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimesOracle</title>
    
    <!-- BIBLIOTECAS FIREBASE (VERSÃO ESTÁVEL 8.10.0) -->
    <!-- Essencial para o Firebase funcionar -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Para o banco de dados Firestore -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <!-- Para autenticação de usuários (e-mail/senha) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        /* Estilos Globais e do Tema */
        :root { 
            --bg: #0f0f0f; 
            --card: #1a1a1a; 
            --text: #ffffff; 
            --primary: #6200ea; 
            --secondary-bg: #222;
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            transition: background-color 0.3s, color 0.3s;
        }

        /* Modo Escuro/Claro */
        body.light-mode {
            --bg: #f0f0f0;
            --card: #ffffff;
            --text: #333333;
            --secondary-bg: #e0e0e0;
        }

        /* Estilos do Header */
        header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            background: #000; 
            height: 60px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333; 
        }
        .logo { 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 20px; 
            flex-grow: 0; /* Ajustado para acomodar a barra de pesquisa */
            margin-right: auto; /* Empurra o logo para a esquerda se necessário */
            text-align: center; 
        }
        .icon-btn { 
            font-size: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: var(--primary); 
            outline: none; 
            padding: 0 5px; 
        }

        /* Estilos da Grade de Animes */
        .grid-recent { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* Responsivo */
            gap: 12px; 
            padding: 15px; 
            max-width: 1200px; /* Largura máxima */
            margin: 0 auto; /* Centraliza */
        }
        .card-recent { 
            background: var(--card); 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #333; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .card-recent:hover {
            transform: translateY(-5px);
        }
        .card-recent img { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            cursor: pointer; 
            display: block; 
        }
        .card-info { 
            padding: 8px; 
            font-size: 13px; 
            font-weight: bold; 
            color: var(--text);
        }

        /* Estilos Comuns para Modais (pop-ups) */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 5000; 
            justify-content: center; 
            align-items: center; 
        }
        .modal-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px; 
            width: 85%; 
            max-width: 400px; 
            border: 1px solid var(--primary); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative; /* Para o botão fechar */
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: var(--secondary-bg); 
            border: 1px solid #333; 
            color: var(--text); 
            border-radius: 5px; 
            box-sizing: border-box; 
        }
        .btn-post { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: background-color 0.2s;
        }
        .btn-post:hover {
            background-color: #4a00af;
        }
        .cancel-btn {
            background: none; 
            color: gray; 
            border: none; 
            margin-top:15px; 
            width:100%; 
            cursor:pointer;
        }

        /* Estilos Específicos para o Menu do Usuário (Sidebar) */
        #userMenu {
            justify-content: flex-start; 
            align-items: stretch; 
            background: rgba(0,0,0,0.7); 
            transition: all 0.3s ease-in-out;
        }
        #userMenu.hidden {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none; /* Desabilita cliques quando escondido */
        }
        #userMenu .modal-card {
            width: 280px; 
            max-width: 80%; 
            height: 100%; 
            border-radius: 0 15px 15px 0; 
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); 
            display: flex;
            flex-direction: column; 
            overflow-y: auto; 
            position: relative; 
            background: var(--card); /* Adapta ao tema */
        }
        #userMenu .close-btn {
            background: none;
            border: none;
            color: var(--text); /* Adapta ao tema */
            font-size: 24px;
            cursor: pointer;
            position: absolute; 
            right: 15px;
            top: 10px;
            z-index: 5001; 
        }
        #userInfoDisplay {
            text-align: center; 
            margin-top: 30px; 
        }
        #userInfoDisplay img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 2px solid var(--primary); 
        }
        #userInfoDisplay p {
            margin: 8px 0;
            padding: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s; 
            color: var(--text);
        }
        #userInfoDisplay p:hover {
            background-color: var(--secondary-bg); 
            border-radius: 5px;
        }
        #userInfoDisplay .menu-item-primary {
            color: var(--primary); 
            font-weight: bold;
        }
        #userInfoDisplay .menu-item-adult {
            font-weight: bold;
            color: #ff4d4d; /* Cor para indicar perigo/alerta */
        }
        #userInfoDisplay .menu-item-adult.active {
            color: #4CAF50; /* Verde quando ativo */
        }
        /* Estilos para o player de vídeo */
        #videoPlayerModal {
            padding: 20px;
            text-align: center;
        }
        #videoPlayerModal iframe {
            width: 100%;
            max-width: 800px;
            height: 450px;
            border: none;
            margin-top: 15px;
        }
        #videoPlayerModal .anime-title {
            color: var(--primary);
            margin-bottom: 10px;
        }
        #videoPlayerModal .close-video-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 30px;
            cursor: pointer;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        /* Estilo para o botão de salvar/remover anime na página de detalhes */
        #btnSalvarAnime.saved {
            background-color: #007bff; /* Azul, para indicar que está salvo */
        }

        /* --- NOVO: Estilos para a Barra de Pesquisa --- */
        .search-container {
            display: flex;
            align-items: center;
            position: absolute; /* Para que não empurre outros elementos no header */
            right: 55px; /* Posição inicial, ao lado do botão de postar */
            transition: all 0.3s ease-in-out;
            max-width: 0; /* Inicia oculto */
            overflow: hidden; /* Esconde o conteúdo extra */
            opacity: 0; /* Também inicia invisível */
            z-index: 999; /* Garante que fique acima de outros elementos do header se sobrepor */
        }
        .search-container.active {
            max-width: 200px; /* Largura visível quando ativo */
            padding-right: 5px; /* Pequeno espaçamento */
            opacity: 1; /* Torna visível */
        }
        .search-container input {
            width: 100%;
            border: 1px solid transparent; /* Borda transparente inicialmente */
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            margin: 0; /* Remove margens padrão */
            background: var(--secondary-bg);
            color: var(--text);
            padding: 8px 10px; /* Ajusta o padding para ser mais compacto */
            border-radius: 5px;
            font-size: 14px;
        }
        .search-container input:focus {
            border-color: var(--primary); /* Borda roxa ao focar */
            outline: none; /* Remove o outline padrão */
            box-shadow: 0 0 5px rgba(98, 0, 234, 0.5); /* Sombra roxa ao focar */
        }
        .search-icon {
            font-size: 20px; /* Tamanho do ícone de lupa */
            color: var(--primary);
            cursor: pointer;
            padding: 0 5px;
            position: absolute; /* Posiciona o ícone sobre o campo de pesquisa */
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            z-index: 1000; /* Garante que o clique seja no botão */
            display: none; /* Oculta o ícone de lupa dentro do input quando a barra está ativa */
        }
        .search-container.active .search-icon {
             position: static; /* Ajusta a posição quando a barra está ativa */
             display: inline-block; /* Mostra o ícone de lupa dentro do input quando a barra está ativa */
        }
        .header-search-trigger { /* O ícone de lupa no header, para mostrar/esconder a barra */
            margin-right: 10px; /* Espaçamento entre o ícone e o botão de postar */
            font-size: 20px;
            cursor: pointer;
            color: var(--primary);
            background: none;
            border: none;
            outline: none;
            padding: 0 5px;
        }


        /* --- NOVO: Media Queries para Responsividade --- */
        @media (max-width: 768px) {
            .grid-recent {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); /* Animes menores em telas pequenas */
                gap: 10px;
                padding: 10px;
            }

            .card-recent {
                font-size: 12px;
            }

            header {
                height: 50px;
                padding: 0 10px;
            }

            .logo {
                font-size: 18px;
            }

            .icon-btn {
                font-size: 20px;
            }

            .modal-card {
                width: 90%;
                padding: 15px;
            }

            #userMenu .modal-card {
                width: 250px;
            }

            #videoPlayerModal iframe {
                height: 250px; /* Altura menor para o vídeo em mobile */
            }

            #ownerActions {
                flex-direction: column; /* Botões de edição/exclusão em coluna no mobile */
                gap: 5px;
            }
            #ownerActions button {
                width: 100% !important; /* Força largura total para os botões */
            }
            .search-container {
                right: 50px; /* Ajusta a posição para telas menores */
            }
        }

        @media (max-width: 480px) {
            .grid-recent {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); /* Animes ainda menores para celulares estreitos */
                gap: 8px;
            }
            .card-info {
                font-size: 11px;
            }
            .search-container.active {
                max-width: 150px; /* Largura menor para o campo de pesquisa em telas muito pequenas */
            }
        }
        /* --- FIM NOVO: Media Queries --- */
    </style>
</head>
<body>

<header>
    <!-- Botão do hambúrguer que agora abre o menu do usuário -->
    <button class="icon-btn" onclick="abrirMenuUsuario()">☰</button>
    <div class="logo">AnimesOracle</div>
    
    <!-- NOVO: Ícone para ativar/desativar a barra de pesquisa -->
    <button class="header-search-trigger" onclick="toggleSearchBar()">🔍</button>
    
    <!-- Barra de Pesquisa -->
    <div class="search-container" id="searchContainer">
        <input type="text" id="searchBar" placeholder="Pesquisar animes..." onfocus="toggleSearchHighlight(true)" onblur="toggleSearchHighlight(false)" onkeyup="pesquisarAnimes(this.value)">
    </div>
    <!-- FIM NOVO: Barra de Pesquisa -->

    <!-- Botão de adicionar anime (permanece o mesmo) -->
    <button class="icon-btn" onclick="document.getElementById('postarModal').style.display='flex'">➕</button>
</header>

<div class="grid-recent" id="animeGrid"></div>

<!-- Modal para Postar Anime -->
<div id="postarModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin:0 0 10px 0;">Postar Anime</h3>
        <!-- NOVO CAMPO ESCONDIDO: Para armazenar o ID do anime a ser editado -->
        <input type="hidden" id="pAnimeId">
        <!-- FIM NOVO CAMPO ESCONDIDO -->
        <input type="text" id="pNome" placeholder="Nome do Anime">
        <input type="text" id="pCapa" placeholder="Link da Imagem (Capa)">
        <input type="text" id="pLink" placeholder="Link do Vídeo (Embed do YouTube/Drive, etc.)">
        <label for="pIsAdult" style="display:block; margin: 10px 0 5px;">
            <input type="checkbox" id="pIsAdult" style="width: auto; margin-right: 5px;"> É +18?
        </label>
        <label for="pType" style="display:block; margin: 5px 0 10px;">
            Tipo: 
            <select id="pType" style="padding: 8px; background: var(--secondary-bg); border: 1px solid #333; color: var(--text); border-radius: 5px;">
                <option value="legendado">Legendado</option>
                <option value="dublado">Dublado</option>
            </select>
        </label>
        <button class="btn-post" id="btnSalvarOuAtualizar" onclick="salvarOuAtualizarAnime()">PUBLICAR</button>
        <button class="cancel-btn" onclick="fecharPostarModal()">Cancelar</button>
    </div>
</div>

<!-- Modal de Autenticação (Login/Cadastro) -->
<div id="authModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin:0 0 10px 0;">Entrar / Cadastrar</h3>
        <input type="email" id="authEmail" placeholder="E-mail">
        <input type="password" id="authPassword" placeholder="Senha">
        <button class="btn-post" onclick="cadastrarUsuario()">CADASTRAR</button>
        <button class="btn-post" onclick="loginUsuario()" style="margin-top: 10px;">ENTRAR</button>
        <button class="cancel-btn" onclick="document.getElementById('authModal').style.display='none'">Cancelar</button>
    </div>
</div>

<!-- Menu do Usuário (Sidebar) -->
<div id="userMenu" class="modal">
    <div class="modal-card">
        <button class="close-btn" onclick="document.getElementById('userMenu').style.display='none'">&times;</button>
        <div id="userInfoDisplay">
                        <!-- Conteúdo do usuário será carregado aqui pelo JavaScript -->
        </div>
        <hr style="border-color:#333; margin:15px 0;">
        <button onclick="logoutUsuario()" class="btn-post" style="background:#cc0000;">Sair</button>
    </div>
</div>

<!-- Modal para o Player de Vídeo -->
<div id="videoModal" class="modal">
    <div class="modal-card" id="videoPlayerModal" style="max-width: 900px;">
        <button class="close-video-btn" onclick="fecharVideoModal()">&times;</button>
        <h3 class="anime-title" id="videoModalTitle"></h3>
        <iframe id="videoFrame" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        <button class="btn-post" id="btnSalvarAnime" onclick="toggleSalvarAnime()"></button>
        
        <!-- NOVOS BOTÕES: Editar e Excluir -->
        <div id="ownerActions" style="margin-top: 15px; display: none; gap: 10px; justify-content: center;">
            <button class="btn-post" style="background: #007bff; width: 48%;" onclick="prepararEdicaoAnime()">EDITAR</button>
            <button class="btn-post" style="background: #dc3545; width: 48%;" onclick="excluirAnimeConfirm()">EXCLUIR</button>
        </div>
        <!-- FIM NOVOS BOTÕES -->
    </div>
</div>

<!-- Scripts Firebase e Lógica da Aplicação -->
<script>
    // 1. CONFIGURAÇÃO DO FIREBASE (SEUS DADOS DE PROJETO)
    const firebaseConfig = { 
      apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw", 
      authDomain: "animesoracle-a60e9.firebaseapp.com", 
      projectId: "animesoracle-a60e9", 
      storageBucket: "animesoracle-a60e9.firebasestorage.app", 
      messagingSenderId: "751657326717", 
      appId: "1:751657326717:web:67ef63d01ffa3ad044f914" 
    };

    // 2. INICIALIZAÇÃO DO FIREBASE
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth(); 

    let currentUserData = null; // Para armazenar os dados do usuário logado e seus settings
    let currentFilter = 'recentes'; // Filtro de animes atual (recentes, legendados, dublados, salvos)
    let currentPlayingAnime = null; // Armazena o ID do anime atualmente no player
    let currentAnimeOwnerId = null; // Armazena o ID do usuário que postou o anime

    // Helper para exibir mensagens de erro/sucesso
    function showMessage(message, type = 'alert') {
        alert(message); // Por simplicidade, usando alert. Em uma app real, use um modal/toast.
    }

    // 3. FUNÇÃO SALVAR OU ATUALIZAR ANIME (PARA O BOTÃO "+")
    async function salvarOuAtualizarAnime() {
        const animeId = document.getElementById('pAnimeId').value; // Pegamos o ID, se existir
        const nome = document.getElementById('pNome').value;
        const capa = document.getElementById('pCapa').value;
        const link = document.getElementById('pLink').value;
        const isAdult = document.getElementById('pIsAdult').checked;
        const type = document.getElementById('pType').value;

        if (!auth.currentUser) {
            showMessage("Você precisa estar logado para postar/editar animes!");
            return;
        }

        if (!nome || !capa || !link) {
            showMessage("Preencha todos os campos (Nome, Capa e Link do Vídeo)!");
            return; 
        }

        try {
            if (animeId) { // Se pAnimeId tem um valor, estamos EDITANDO
                await db.collection("animes").doc(animeId).update({
                    nome: nome,
                    capa: capa,
                    link: link,
                    isAdult: isAdult,
                    type: type,
                    // Não alteramos 'data' nem 'postedBy' na edição
                });
                showMessage("Sucesso! Anime atualizado.");
            } else { // Caso contrário, estamos CRIANDO um NOVO anime
                await db.collection("animes").add({
                    nome: nome,
                    capa: capa,
                    link: link,
                    data: firebase.firestore.FieldValue.serverTimestamp(),
                    postedBy: auth.currentUser.uid, 
                    isAdult: isAdult, 
                    type: type
                });
                showMessage("Sucesso! Anime postado.");
            }
            fecharPostarModal(); // Fecha o modal após a operação
            carregarAnimes(currentFilter); // Recarrega a lista
        } catch (e) {
            console.error("Erro ao salvar/atualizar:", e); 
            showMessage("Erro do Firebase: " + e.message + "\n\nVerifique as 'Regras' no Firebase!");
        }
    }


    // 4. LÓGICA DE AUTENTICAÇÃO (LOGIN/CADASTRO/LOGOUT)
    async function cadastrarUsuario() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;

        if (!email || !password) {
            showMessage("Por favor, preencha E-mail e Senha para cadastro.");
            return;
        }
        if (password.length < 6) {
            showMessage("A senha deve ter pelo menos 6 caracteres.");
            return;
        }

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection("users").doc(userCredential.user.uid).set({
                email: email,
                photoURL: 'https://via.placeholder.com/60?text=AP', 
                animesSalvos: [],
                modoAdulto: false,
                theme: 'dark' 
            });
            showMessage("Cadastro realizado com sucesso!");
            document.getElementById('authModal').style.display = 'none';
        } catch (error) {
            console.error("Erro ao cadastrar:", error);
            showMessage("Erro ao cadastrar: " + error.message);
        }
    }

    async function loginUsuario() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;

        if (!email || !password) {
            showMessage("Por favor, preencha E-mail e Senha para entrar.");
            return;
        }

        try {
            await auth.signInWithEmailAndPassword(email, password);
            showMessage("Login realizado com sucesso!");
            document.getElementById('authModal').style.display = 'none';
        } catch (error) {
            console.error("Erro ao fazer login:", error);
            showMessage("Erro ao fazer login: " + error.message);
        }
    }

    async function logoutUsuario() {
        try {
            await auth.signOut();
            showMessage("Você foi desconectado.");
            document.getElementById('userMenu').style.display = 'none'; 
            // Limpa a exibição do usuário
            document.getElementById('userInfoDisplay').innerHTML = '';
            currentUserData = null; // Limpa os dados do usuário
            carregarAnimes('recentes'); // Volta para a exibição padrão de animes
        } catch (error) {
            console.error("Erro ao fazer logout:", error);
            showMessage("Erro ao fazer logout: " + error.message);
        }
    }

    // NOVO: Função para preparar o modal de postagem para edição
    function prepararEdicaoAnime() {
        if (!currentPlayingAnime) {
            showMessage("Nenhum anime selecionado para edição.");
            return;
        }

        document.getElementById('pAnimeId').value = currentPlayingAnime.id;
        document.getElementById('pNome').value = currentPlayingAnime.nome;
        document.getElementById('pCapa').value = currentPlayingAnime.capa;
        document.getElementById('pLink').value = currentPlayingAnime.link;
        document.getElementById('pIsAdult').checked = currentPlayingAnime.isAdult || false;
        document.getElementById('pType').value = currentPlayingAnime.type || 'legendado';

        // Altera o texto do botão para "ATUALIZAR"
        document.getElementById('btnSalvarOuAtualizar').textContent = "ATUALIZAR";
        
        document.getElementById('videoModal').style.display = 'none'; // Fecha o modal de vídeo
        document.getElementById('postarModal').style.display = 'flex'; // Abre o modal de postagem/edição
    }

    // NOVO: Função para confirmar e excluir um anime
    async function excluirAnimeConfirm() {
        if (!currentPlayingAnime) {
            showMessage("Nenhum anime selecionado para exclusão.");
            return;
        }

        const confirmacao = confirm(`Tem certeza que deseja excluir o anime "${currentPlayingAnime.nome}"? Esta ação é irreversível.`);
        if (confirmacao) {
            await excluirAnime(currentPlayingAnime.id);
        }
    }

    // NOVO: Função para excluir um anime do Firestore
    async function excluirAnime(animeId) {
        if (!auth.currentUser || auth.currentUser.uid !== currentAnimeOwnerId) {
            showMessage("Você não tem permissão para excluir este anime.");
            return;
        }
        try {
            await db.collection("animes").doc(animeId).delete();
            showMessage(`"${currentPlayingAnime.nome}" excluído com sucesso!`);
            fecharVideoModal(); // Fecha o modal de vídeo
            carregarAnimes(currentFilter); // Recarrega a lista
        } catch (error) {
            console.error("Erro ao excluir anime:", error);
            showMessage("Erro ao excluir anime: " + error.message);
        }
    }

    // NOVO: Função para fechar o modal de postagem/edição e limpar o formulário
    function fecharPostarModal() {
        document.getElementById('postarModal').style.display = 'none';
        // Limpa todos os campos
        document.getElementById('pAnimeId').value = "";
        document.getElementById('pNome').value = "";
        document.getElementById('pCapa').value = "";
        document.getElementById('pLink').value = "";
        document.getElementById('pIsAdult').checked = false;
        document.getElementById('pType').value = 'legendado';
        document.getElementById('btnSalvarOuAtualizar').textContent = "PUBLICAR"; // Restaura o texto original do botão
    }

    // 5. LÓGICA DO MENU DO USUÁRIO E OUTRAS FUNCIONALIDADES

    async function carregarDadosUsuario(uid) {
        try {
            const userDoc = await db.collection("users").doc(uid).get();
            if (userDoc.exists) {
                currentUserData = userDoc.data();
                const userInfoDisplay = document.getElementById('userInfoDisplay');
                userInfoDisplay.innerHTML = ''; // Limpa o conteúdo anterior

                const img = document.createElement('img');
                img.src = currentUserData.photoURL || 'https://via.placeholder.com/60?text=AP';
                img.alt = 'Foto de Perfil';
                userInfoDisplay.appendChild(img);

                const pEmail = document.createElement('p');
                pEmail.textContent = currentUserData.email;
                userInfoDisplay.appendChild(pEmail);

                // Opções do menu
                userInfoDisplay.innerHTML += `
                    <p onclick="mostrarAnimes('recentes')" class="menu-item-white">Animes Recentes</p>
                    <p onclick="mostrarAnimes('legendado')" class="menu-item-white">Animes Legendados</p>
                    <p onclick="mostrarAnimes('dublado')" class="menu-item-white">Animes Dublados</p>
                    <p onclick="mostrarAnimes('salvos')" class="menu-item-primary">Animes Salvos (${currentUserData.animesSalvos ? currentUserData.animesSalvos.length : 0})</p>
                    <hr style="border-color:#333; margin:15px 0;">
                    <p onclick="toggleModoNoite()" class="menu-item-white">Modo Noite/Dia</p>
                    <p id="modoAdultoMenuItem" onclick="toggleModoAdulto()" class="menu-item-adult ${currentUserData.modoAdulto ? 'active' : ''}">Modo Adulto (+18)</p>
                `;
                // Aplica o tema imediatamente
                aplicarTema(currentUserData.theme);

            }
        } catch (error) {
            console.error("Erro ao carregar dados do usuário:", error);
            showMessage("Erro ao carregar dados do usuário: " + error.message);
        }
    }

    // Abre o menu do usuário, verificando o status de login
    async function abrirMenuUsuario() {
        const user = auth.currentUser;
        if (user) {
            await carregarDadosUsuario(user.uid);
            document.getElementById('userMenu').style.display = 'flex';
        } else {
            document.getElementById('authModal').style.display = 'flex';
        }
    }

    // Função para alternar o tema (noite/dia)
    async function toggleModoNoite() {
        const newTheme = document.body.classList.contains('light-mode') ? 'dark' : 'light';
        aplicarTema(newTheme);

        if (auth.currentUser && currentUserData) {
            try {
                await db.collection("users").doc(auth.currentUser.uid).update({ theme: newTheme });
                currentUserData.theme = newTheme; // Atualiza o dado local
            } catch (error) {
                console.error("Erro ao salvar preferência de tema:", error);
            }
        }
    }

    // Aplica o tema visualmente
    function aplicarTema(theme) {
        if (theme === 'light') {
            document.body.classList.add('light-mode');
        } else {
            document.body.classList.remove('light-mode');
        }
    }

        // Função para alternar o modo adulto
    async function toggleModoAdulto() {
        if (!auth.currentUser || !currentUserData) {
            showMessage("Você precisa estar logado para alterar as configurações de modo adulto.");
            return;
        }

        const newModoAdultoState = !currentUserData.modoAdulto;
        try {
            await db.collection("users").doc(auth.currentUser.uid).update({ modoAdulto: newModoAdultoState });
            currentUserData.modoAdulto = newModoAdultoState; // Atualiza o dado local
            const modoAdultoMenuItem = document.getElementById('modoAdultoMenuItem');
            if (modoAdultoMenuItem) {
                modoAdultoMenuItem.classList.toggle('active', newModoAdultoState);
                modoAdultoMenuItem.textContent = newModoAdultoState ? "Modo Adulto (+18) Ativo" : "Modo Adulto (+18)";
            }
            showMessage(`Modo Adulto: ${newModoAdultoState ? 'Ativado' : 'Desativado'}.`, 'info');
            carregarAnimes(currentFilter); // Recarrega os animes com a nova configuração
        } catch (error) {
            console.error("Erro ao atualizar modo adulto:", error);
            showMessage("Erro ao atualizar modo adulto: " + error.message);
        }
    }

    // Função para exibir animes com base no filtro
    async function mostrarAnimes(filtro) {
        currentFilter = filtro;
        document.getElementById('userMenu').style.display = 'none'; // Fecha o menu
        carregarAnimes(filtro);
    }

    // Função para carregar e exibir animes
    async function carregarAnimes(filtro = 'recentes', searchTerm = '') { // Adicionado searchTerm
        const animeGrid = document.getElementById('animeGrid');
        animeGrid.innerHTML = '<h2>Carregando Animes...</h2>'; // Mensagem de carregamento

        let query = db.collection("animes");

        if (filtro === 'legendado' || filtro === 'dublado') {
            query = query.where('type', '==', filtro);
        } else if (filtro === 'salvos') {
            if (!auth.currentUser || !currentUserData || !currentUserData.animesSalvos || currentUserData.animesSalvos.length === 0) {
                animeGrid.innerHTML = '<p>Você não possui animes salvos ou não está logado.</p>';
                return;
            }
            const savedAnimesPromises = currentUserData.animesSalvos.map(animeId => db.collection("animes").doc(animeId).get());
            const savedAnimeSnapshots = await Promise.all(savedAnimesPromises);
            
            animeGrid.innerHTML = '';
            savedAnimeSnapshots.forEach(doc => {
                if (doc.exists) {
                    const anime = { id: doc.id, ...doc.data() };
                    // Aplica as mesmas verificações de adulto que o filtro geral E filtro de pesquisa
                    if ((anime.isAdult && (!auth.currentUser || !currentUserData.modoAdulto)) || 
                        (searchTerm && !anime.nome.toLowerCase().includes(searchTerm.toLowerCase()))) {
                        return; 
                    }
                    displayAnimeCard(animeGrid, anime);
                }
            });
            if (animeGrid.innerHTML === '') {
                animeGrid.innerHTML = '<p>Nenhum anime salvo corresponde aos seus critérios de visualização.</p>';
            }
            return; // Termina a função aqui para animes salvos
        }
        
        // NOVO: Filtragem por termo de pesquisa
        if (searchTerm) {
            // Firestore não permite "like" queries diretamente, então faremos uma filtragem básica no cliente
            // Para um sistema robusto, considere soluções como Algolia ou buscas mais avançadas.
            // Por enquanto, vamos carregar tudo e filtrar em memória se houver termo de busca.
            // Para grandes volumes, isso não é eficiente.
        }

        // Sempre ordena por data para "recentes" e outros filtros
        query = query.orderBy("data", "desc");

        try {
            const animesSnapshot = await query.get();
            animeGrid.innerHTML = ''; // Limpa a mensagem de carregamento

            if (animesSnapshot.empty && !searchTerm) { // Se não há animes e não está pesquisando
                animeGrid.innerHTML = '<p>Nenhum anime encontrado.</p>';
                return;
            }

            let filteredAnimes = [];
            animesSnapshot.forEach(doc => {
                const anime = { id: doc.id, ...doc.data() };
                // Lógica de filtragem do modo adulto e pesquisa no front-end
                if (anime.isAdult && (!auth.currentUser || !currentUserData || !currentUserData.modoAdulto)) {
                    return; 
                }
                if (searchTerm && !anime.nome.toLowerCase().includes(searchTerm.toLowerCase())) {
                    return;
                }
                filteredAnimes.push(anime);
            });

            if (filteredAnimes.length === 0) {
                 animeGrid.innerHTML = '<p>Nenhum anime encontrado com este nome.</p>';
                 return;
            }

            filteredAnimes.forEach(anime => displayAnimeCard(animeGrid, anime));

        } catch (error) {
            console.error("Erro ao carregar animes:", error);
            animeGrid.innerHTML = '<p>Erro ao carregar animes.</p>';
            showMessage("Erro ao carregar animes: " + error.message);
        }
    }

    // Função para exibir um único card de anime
    function displayAnimeCard(gridElement, anime) {
        const card = document.createElement('div');
        card.className = 'card-recent';
        card.onclick = () => abrirVideoModal(anime); // Adiciona o evento de clique para abrir o vídeo
        card.innerHTML = `
            <img src="${anime.capa}" alt="${anime.nome}">
            <div class="card-info">${anime.nome}</div>
        `;
        gridElement.appendChild(card);
    }

    // Funções do Modal de Vídeo
    function abrirVideoModal(anime) {
        currentPlayingAnime = anime; // Armazena o anime que está sendo reproduzido
        currentAnimeOwnerId = anime.postedBy; // Armazena o ID do usuário que postou o anime
        const videoModal = document.getElementById('videoModal');
        const videoFrame = document.getElementById('videoFrame');
        const videoModalTitle = document.getElementById('videoModalTitle');
        const btnSalvarAnime = document.getElementById('btnSalvarAnime');
        const ownerActions = document.getElementById('ownerActions'); // Referência à div dos botões

        videoModalTitle.textContent = anime.nome;
        
        // Converte o link para formato embed do YouTube/Drive se necessário
        let embedLink = anime.link;
        if (anime.link.includes("youtube.com/watch?v=")) {
            embedLink = anime.link.replace("watch?v=", "embed/");
        } else if (anime.link.includes("youtu.be/")) {
            embedLink = anime.link.replace("youtu.be/", "youtube.com/embed/");
        }
        // Para Google Drive, link de embed geralmente é algo como:
        // https://docs.google.com/file/d/VIDEO_ID/preview
        // Se precisar de mais personalização para outros players, pode adicionar aqui.

        videoFrame.src = embedLink + "?autoplay=1"; // Autoplay no vídeo

        // Atualiza o botão Salvar Anime
        if (auth.currentUser && currentUserData && currentUserData.animesSalvos.includes(anime.id)) {
            btnSalvarAnime.textContent = "Remover dos Salvos";
            btnSalvarAnime.classList.add('saved');
        } else {
            btnSalvarAnime.textContent = "Salvar Anime";
            btnSalvarAnime.classList.remove('saved');
        }
        // Lógica para mostrar/esconder botões de edição/exclusão
        if (auth.currentUser && auth.currentUser.uid === currentAnimeOwnerId) {
            ownerActions.style.display = 'flex'; // Mostra os botões
        } else {
            ownerActions.style.display = 'none'; // Esconde os botões
        }

        videoModal.style.display = 'flex';
    }

    function fecharVideoModal() {
        const videoModal = document.getElementById('videoModal');
        const videoFrame = document.getElementById('videoFrame');
        videoFrame.src = ""; // Para parar o vídeo
        videoModal.style.display = 'none';
        currentPlayingAnime = null;
        currentAnimeOwnerId = null; // Limpa o ID do autor
    }

    // Função para salvar/remover anime da lista do usuário
    async function toggleSalvarAnime() {
        if (!auth.currentUser || !currentUserData) {
            showMessage("Você precisa estar logado para salvar animes!");
            document.getElementById('videoModal').style.display = 'none'; // Fecha o player
            document.getElementById('authModal').style.display = 'flex'; // Abre o modal de login
            return;
        }

        if (!currentPlayingAnime) {
            showMessage("Nenhum anime selecionado para salvar/remover.");
            return;
        }

        const animeId = currentPlayingAnime.id;
        const animesSalvos = currentUserData.animesSalvos || [];
        const btnSalvarAnime = document.getElementById('btnSalvarAnime');

        try {
            if (animesSalvos.includes(animeId)) {
                // Remover
                const updatedAnimesSalvos = animesSalvos.filter(id => id !== animeId);
                await db.collection("users").doc(auth.currentUser.uid).update({ animesSalvos: updatedAnimesSalvos });
                currentUserData.animesSalvos = updatedAnimesSalvos;
                btnSalvarAnime.textContent = "Salvar Anime";
                btnSalvarAnime.classList.remove('saved');
                showMessage(`"${currentPlayingAnime.nome}" removido dos seus animes salvos.`);
            } else {
                // Adicionar
                const updatedAnimesSalvos = [...animesSalvos, animeId];
                await db.collection("users").doc(auth.currentUser.uid).update({ animesSalvos: updatedAnimesSalvos });
                currentUserData.animesSalvos = updatedAnimesSalvos;
                btnSalvarAnime.textContent = "Remover dos Salvos";
                btnSalvarAnime.classList.add('saved');
                showMessage(`"${currentPlayingAnime.nome}" adicionado aos seus animes salvos!`);
            }
        } catch (error) {
            console.error("Erro ao atualizar animes salvos:", error);
            showMessage("Erro ao salvar/remover anime: " + error.message);
        }
    }

    // NOVO: Lógica da barra de pesquisa
    let searchTimeout;

    // Função para mostrar/esconder a barra de pesquisa
    function toggleSearchBar() {
        const searchContainer = document.getElementById('searchContainer');
        const searchBar = document.getElementById('searchBar');
        
        searchContainer.classList.toggle('active');

        if (searchContainer.classList.contains('active')) {
            searchBar.focus(); // Coloca o foco na barra de pesquisa
        } else {
            searchBar.value = ''; // Limpa o campo
            pesquisarAnimes(''); // Volta a exibir todos os animes
            searchBar.blur(); // Remove o foco
        }
    }

    // Função para aplicar/remover o destaque na barra de pesquisa
    function toggleSearchHighlight(isFocused) {
        const searchBar = document.getElementById('searchBar');
        if (isFocused) {
            searchBar.classList.add('focused'); // Adiciona uma classe para o highlight
        } else {
            searchBar.classList.remove('focused');
        }
    }

    // Função de pesquisa
    function pesquisarAnimes(searchTerm) {
        clearTimeout(searchTimeout); // Limpa qualquer timeout anterior
        searchTimeout = setTimeout(() => {
            carregarAnimes(currentFilter, searchTerm); // Chama carregarAnimes com o termo de busca
        }, 300); // Pequeno atraso para não pesquisar a cada tecla
    }


        // Monitorar o estado de autenticação para atualizar a UI
    auth.onAuthStateChanged(user => {
        if (user) {
            console.log("Usuário logado:", user.email);
            // Carrega os dados do usuário e aplica as preferências (tema, modo adulto)
            carregarDadosUsuario(user.uid).then(() => {
                carregarAnimes(currentFilter); // Recarrega animes com base nas preferências do usuário
            });
        } else {
            console.log("Usuário deslogado.");
            currentUserData = null; // Limpa os dados do usuário
            document.getElementById('userMenu').style.display = 'none'; // Esconde o menu
            // Se o modo adulto estava ativo, ele será desativado ao deslogar
            aplicarTema('dark'); // Volta para o tema padrão (escuro)
            document.getElementById('userInfoDisplay').innerHTML = ''; // Limpa info do usuário
            carregarAnimes('recentes'); // Mostra animes recentes (sem filtro de usuário)
        }
    });

    // Inicia o carregamento de animes quando a página é carregada
    // Se já estiver logado (sessão persistente), onAuthStateChanged cuidará da primeira carga
    // Caso contrário, carrega animes recentes como default
    if (!auth.currentUser) {
        carregarAnimes('recentes');
    }
