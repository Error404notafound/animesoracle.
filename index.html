    <style>
        /* Estilos Globais e do Tema */
        :root { 
            --bg: #0f0f0f; 
            --card: #1a1a1a; 
            --text: #ffffff; 
            --primary: #6200ea; /* Roxo */
            --secondary-bg: #222;
            --highlight: #6200ea; /* Cor de destaque roxa */
            --error: #cc0000; /* Cor de erro vermelha */
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            transition: background-color 0.3s, color 0.3s;
        }

        /* Modo Escuro/Claro */
        body.light-mode {
            --bg: #f0f0f0;
            --card: #ffffff;
            --text: #333333;
            --secondary-bg: #e0e0e0;
        }

        /* Estilos do Header */
        header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            background: #000; 
            height: 60px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333; 
        }
        .logo { 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 20px; 
            flex-grow: 1; 
            text-align: center; 
        }
        .icon-btn { 
            font-size: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: var(--primary); 
            outline: none; 
            padding: 0 5px; 
        }

        /* Novo: Barra de pesquisa */
        #searchContainer {
            position: relative;
            flex-grow: 1;
            display: flex;
            justify-content: center;
        }
        #searchBar {
            width: 0; /* Inicialmente oculto */
            padding: 8px 12px;
            border: 1px solid transparent; /* Borda transparente inicial */
            border-radius: 20px;
            background: var(--secondary-bg);
            color: var(--text);
            transition: width 0.3s ease-in-out, border-color 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            opacity: 0;
            cursor: pointer;
        }
        #searchBar.active {
            width: 80%; /* Ajuste a largura conforme necessário */
            max-width: 400px;
            border-color: var(--highlight); /* Borda roxa ao ativar */
            box-shadow: 0 0 8px var(--highlight); /* Luz roxa */
            opacity: 1;
            cursor: text;
        }
        /* Botão para ativar/desativar pesquisa */
        .search-icon-btn {
            font-size: 24px;
            color: var(--primary);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 5px;
            margin-left: 10px; /* Espaço entre o logo e o ícone de pesquisa */
        }
        /* Menu alfabético */
        #alphabetMenu {
            display: flex;
            justify-content: center;
            padding: 5px 0;
            background: var(--card);
            border-bottom: 1px solid #333;
            flex-wrap: wrap; /* Para quebrar linha em telas menores */
        }
        #alphabetMenu span {
            padding: 3px 6px;
            cursor: pointer;
            color: var(--text);
            font-size: 14px;
            transition: color 0.2s, background-color 0.2s;
        }
        #alphabetMenu span:hover {
            color: var(--primary);
            background-color: var(--secondary-bg);
            border-radius: 3px;
        }


        /* Estilos da Grade de Animes */
        .grid-recent { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* Responsivo */
            gap: 12px; 
            padding: 15px; 
            max-width: 1200px; /* Largura máxima */
            margin: 0 auto; /* Centraliza */
        }
        .card-recent { 
            background: var(--card); 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #333; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            position: relative; /* Para o destaque */
        }
        .card-recent:hover {
            transform: translateY(-5px);
        }
