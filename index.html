<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimesOracle</title>
    
    <!-- BIBLIOTECAS FIREBASE (OBRIGATÓRIO TER AS 3) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root {
            --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; 
            --primary: #6200ea; --shadow: rgba(98, 0, 234, 0.8);
            --brightness: 100%;
        }
        body { 
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
            filter: brightness(var(--brightness)); transition: 0.3s;
        }

        /* HEADER CENTRALIZADO */
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; background: #000; height: 60px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #222;
        }
        .logo { font-weight: bold; color: var(--primary); font-size: 22px; flex-grow: 1; text-align: center; text-shadow: 0 0 10px var(--primary); }
        .icon-btn { font-size: 26px; cursor: pointer; background: none; border: none; color: var(--primary); outline: none; }
        
        /* BUSCA COM LUZ ROXA */
        #searchBox { display: none; padding: 10px; background: #000; }
        #searchBox input { 
            width: 100%; padding: 12px; border-radius: 5px; border: 2px solid var(--primary); 
            background: #111; color: white; box-shadow: 0 0 15px var(--primary); outline: none; 
        }

        /* MENU ABC */
        .abc-menu {
            display: flex; overflow-x: auto; background: #050505; padding: 12px; gap: 15px;
            scrollbar-width: none; border-bottom: 1px solid #222;
        }
        .abc-menu::-webkit-scrollbar { display: none; }
        .abc-menu a { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 16px; }

        /* MENU LATERAL */
        .side-menu {
            position: fixed; left: -100%; top: 0; width: 280px; height: 100%;
            background: #111; z-index: 2000; transition: 0.4s; padding: 20px;
            box-sizing: border-box; border-right: 2px solid var(--primary); overflow-y: auto;
        }
        .side-menu.active { left: 0; }
        .menu-item { display: block; color: white; padding: 15px 0; text-decoration: none; border-bottom: 1px solid #222; }
        .list-title { color: var(--primary); margin-top: 20px; font-weight: bold; }

        /* CARDS DE ANIMES */
        .grid-animes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { 
            background: var(--card); border-radius: 10px; overflow: hidden; 
            border: 2px solid var(--primary); box-shadow: 0 0 12px var(--shadow);
            position: relative; transition: 0.3s;
        }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; cursor: pointer; }
        .card-info { padding: 8px; font-size: 13px; font-weight: bold; text-align: center; }
        
        .player-btn { 
            background: var(--primary); color: white; border: none; padding: 6px 10px; 
            border-radius: 4px; margin: 3px; font-size: 11px; cursor: pointer;
        }

        /* MODAL POSTAR */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center;
        }
        .modal-card { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-purple { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; }
    </style>
</head>
<body>

<header>
    <button class="icon-btn" onclick="toggleMenu()">☰</button>
    <div class="logo">AnimesOracle</div>
    <div style="display: flex; gap: 10px;">
        <button class="icon-btn" onclick="abrirPostar()">➕</button>
        <button class="icon-btn" onclick="toggleSearch()">🔍</button>
    </div>
</header>

<div id="searchBox"><input type="text" id="inputBusca" placeholder="Pesquisar anime..."></div>
<div class="abc-menu" id="abcRow"></div>

<div id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <!-- ÁREA DE LOGIN / CADASTRO -->
    <div id="authSection">
        <h3 style="color:var(--primary); margin-top:0;">Login / Cadastro</h3>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha (mín. 6 dígitos)">
        <button class="btn-purple" onclick="logarOuCadastrar()">ENTRAR / CADASTRAR</button>
        <p style="font-size: 10px; color: #888; margin-top:10px;">Se você não tem conta, ela será criada automaticamente ao clicar.</p>
    </div>

    <!-- ÁREA DO USUÁRIO LOGADO -->
    <div id="userProfile" style="display:none; text-align:center;">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:15px;" id="userNameDisplay"></div>
        
        <div style="background:#222; padding:15px; border-radius:8px; text-align:left;">
            <small>Brilho do Site:</small>
            <input type="range" min="30" max="100" value="100" oninput="document.body.style.setProperty('--brightness', this.value+'%')">
            
            <label style="display:flex; align-items:center; gap:10px; margin-top:10px; font-size:14px;">
                <input type="checkbox" id="adultCheck"> Modo Adulto (+18)
            </label>
        </div>

        <button onclick="deslogar()" style="background:none; border:none; color:red; margin-top:20px; cursor:pointer;">Sair da conta</button>
    </div>

    <div class="menu-item">Animes Dublados</div>
    <div class="menu-item">Animes Legendados</div>
    <div class="list-title">MINHA LISTA</div>
    <div id="minhaLista"></div>
</div>

<div class="grid-animes" id="animeGrid"></div>

<!-- MODAL DE POSTAGEM -->
<div id="postarModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin:0;">Postar Anime</h3>
        <input type="text" id="pNome" placeholder="Nome do Anime">
        <input type="text" id="pCapa" placeholder="Link da Imagem (Capa)">
        <input type="text" id="pLink" placeholder="Link do Vídeo">
        <select id="pTipo">
            <option value="comum">Animes Comuns</option>
            <option value="adulto">Conteúdo +18</option>
        </select>
        <button class="btn-purple" onclick="publicarAnime()">PUBLICAR AGORA</button>
        <button onclick="fecharPostar()" style="background:none; border:none; color:gray; width:100%; margin-top:15px;">Cancelar</button>
    </div>
</div>

<script>
    // 1. CONFIGURAÇÃO
    const firebaseConfig = { 
        apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw", 
        authDomain: "://firebaseapp.com", 
        projectId: "animesoracle-a60e9", 
        storageBucket: "animesoracle-a60e9.firebasestorage.app", 
        messagingSenderId: "751657326717", 
        appId: "1:751657326717:web:67ef63d01ffa3ad044f914" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // 2. MENU ABC
    const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    letras.forEach(l => { document.getElementById('abcRow').innerHTML += `<a href="#">${l}</a>`; });

    // 3. FUNÇÕES DE INTERFACE
    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sideMenu').classList.contains('active') ? 'block' : 'none';
    }
    function toggleSearch() {
        const s = document.getElementById('searchBox');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    }
    function abrirPostar() {
        if(!auth.currentUser) return alert("Acesse sua conta para poder postar!");
        document.getElementById('postarModal').style.display = 'flex';
    }
    function fecharPostar() { document.getElementById('postarModal').style.display = 'none'; }

    // 4. LOGIN E CADASTRO (COM ALERTA DE ERRO)
    function logarOuCadastrar() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('password').value;
        
        if(!e || s.length < 6) return alert("Digite um e-mail válido e uma senha de no mínimo 6 caracteres.");

        auth.signInWithEmailAndPassword(e, s)
            .then(() => { alert("Login realizado com sucesso!"); })
            .catch(error => {
                if (error.code === 'auth/user-not-found') {
                    // Se usuário não existe, tenta cadastrar
                    auth.createUserWithEmailAndPassword(e, s)
                        .then(() => alert("Conta criada com sucesso!"))
                        .catch(err => alert("ERRO NO CADASTRO: " + err.message));
                } else {
                    alert("ERRO DO FIREBASE: " + error.message);
                }
            });
    }

    function deslogar() { auth.signOut(); location.reload(); }

    // OBSERVAR LOGIN
    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('userProfile').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = user.email;
        }
    });

    // 5. POSTAR ANIME
    async function publicarAnime() {
        const nome = document.getElementById('pNome').value;
        const capa = document.getElementById('pCapa').value;
        const link = document.getElementById('pLink').value;
        const tipo = document.getElementById('pTipo').value;

        if(!nome || !capa || !link) return alert("Preencha todos os campos!");

        try {
            await db.collection("animes").add({
                nome: nome, capa: capa, link: link, tipo: tipo,
                autor: auth.currentUser.email,
                data: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Sucesso! Anime postado.");
            fecharPostar();
        } catch(e) { alert("Erro ao salvar: " + e.message); }
    }

    // 6. CARREGAR E AGRUPAR PLAYERS
    db.collection("animes").orderBy("data", "desc").onSnapshot(snap => {
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = "";
        let grupos = {};

        snap.forEach(doc => {
            const anime = doc.data();
            if(!grupos[anime.nome]) grupos[anime.nome] = [];
            grupos[anime.nome].push(anime);
        });

        for (let nome in grupos) {
            const lista = grupos[nome];
            const primeiro = lista[0];
            grid.innerHTML += `
                <div class="card">
                    <img src="${primeiro.capa}" onclick="window.open('${primeiro.link}')">
                    <div class="card-info">${nome}</div>
                    <div style="text-align:center; padding-bottom:10px;">
                        ${lista.map((v, i) => `<button class="player-btn" onclick="window.open('${v.link}')">Player ${i+1}</button>`).join("")}
                    </div>
                </div>`;
        }
    });
</script>
</body>
</html>
