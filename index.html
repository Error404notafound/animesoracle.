<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimesOracle</title>
    
    <!-- BIBLIOTECAS FIREBASE (VERSÃO ESTÁVEL 8.10.0) -->
    <!-- Essencial para o Firebase funcionar -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Para o banco de dados Firestore -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <!-- Para autenticação de usuários (e-mail/senha) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        /* Estilos Globais e do Tema */
        :root { 
            --bg: #0f0f0f; 
            --card: #1a1a1a; 
            --text: #ffffff; 
            --primary: #6200ea; 
            --secondary-bg: #222;
            --featured-glow: 0 0 15px 5px rgba(138, 43, 226, 0.7); /* Roxo brilhante */
            --danger-color: #ff4d4d;
            --success-color: #4CAF50;
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            transition: background-color 0.3s, color 0.3s;
        }

        /* Modo Escuro/Claro */
        body.light-mode {
            --bg: #f0f0f0;
            --card: #ffffff;
            --text: #333333;
            --secondary-bg: #e0e0e0;
            --featured-glow: 0 0 15px 5px rgba(138, 43, 226, 0.4);
        }

        /* Estilos do Header */
        header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            background: #000; 
            height: 60px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333; 
        }
        .logo { 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 20px; 
            flex-grow: 1; 
            text-align: center; 
        }
        .icon-btn { 
            font-size: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: var(--primary); 
            outline: none; 
            padding: 0 5px; 
        }

        /* Menu Alfabético */
        .alphabet-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px 0;
            background: var(--secondary-bg);
            border-bottom: 1px solid #333;
            margin-bottom: 15px;
            gap: 5px; /* Espaço entre os botões */
        }
        .alphabet-menu button {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 10px;
            margin: 2px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s, color 0.2s;
        }
        .alphabet-menu button:hover,
        .alphabet-menu button.active {
            background: var(--primary);
            color: var(--text);
        }

        /* Seções de Destaque */
        .featured-section {
            padding: 15px;
            max-width: 1200px;
            margin: 0 auto 20px auto;
        }
        .featured-section h2 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 15px;
        }
        .featured-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* Responsivo */
            gap: 12px; 
        }

        /* Estilos da Grade de Animes */
        .grid-recent { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* Responsivo */
            gap: 12px; 
            padding: 15px; 
            max-width: 1200px; /* Largura máxima */
            margin: 0 auto; /* Centraliza */
        }
        .card-recent { 
            background: var(--card); 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #333; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.3s; /* Adicionado box-shadow para transição */
        }
        .card-recent:hover {
            transform: translateY(-5px);
        }
        .card-recent img { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            cursor: pointer; 
            display: block; 
        }
        .card-info { 
            padding: 8px; 
            font-size: 13px; 
            font-weight: bold; 
            color: var(--text);
        }
        /* Estilo para cards de destaque */
        .card-recent.featured {
            box-shadow: var(--featured-glow);
            border-color: var(--primary);
        }

        /* Estilos Comuns para Modais (pop-ups) */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 5000; 
            justify-content: center; 
            align-items: center; 
            animation: fadeIn 0.3s forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal.fade-out {
            animation: fadeOut 0.3s forwards;
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .modal-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px; 
            width: 85%; 
            max-width: 400px; 
            border: 1px solid var(--primary); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative; /* Para o botão fechar */
        }
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: var(--secondary-bg); 
            border: 1px solid #333; 
            color: var(--text); 
            border-radius: 5px; 
            box-sizing: border-box; 
        }
        .btn-post { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
                        margin-top: 10px; 
            transition: background-color 0.2s;
        }
        .btn-post:hover {
            background-color: #4a00af;
        }
        .cancel-btn {
            background: none; 
            color: gray; 
            border: none; 
            margin-top:15px; 
            width:100%; 
            cursor:pointer;
        }

        /* Estilos Específicos para o Menu do Usuário (Sidebar) */
        #userMenu {
            display: none; /* Esconde por padrão */
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); 
            z-index: 5000; 
            justify-content: flex-start; /* Alinha o modal-card à esquerda */
            align-items: stretch; /* Estica o modal-card verticalmente */
            transition: all 0.3s ease-in-out;
            transform: translateX(-100%); /* Começa fora da tela */
            opacity: 0;
            pointer-events: none; /* Desabilita cliques quando escondido */
        }
        #userMenu.active {
            transform: translateX(0%); /* Entra na tela */
            opacity: 1;
            pointer-events: auto; /* Habilita cliques */
            display: flex; /* Exibe quando ativo */
        }
        #userMenu .modal-card {
            width: 280px; 
            max-width: 80%; 
            height: 100%; 
            border-radius: 0 15px 15px 0; 
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); 
            display: flex;
            flex-direction: column; 
            overflow-y: auto; 
            position: relative; 
            background: var(--card); /* Adapta ao tema */
        }
        #userMenu .close-btn {
            background: none;
            border: none;
            color: var(--text); /* Adapta ao tema */
            font-size: 24px;
            cursor: pointer;
            position: absolute; 
            right: 15px;
            top: 10px;
            z-index: 5001; 
        }
        #userInfoDisplay {
            text-align: center; 
            margin-top: 30px; 
        }
        #userInfoDisplay img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 2px solid var(--primary); 
        }
        #userInfoDisplay p {
            margin: 8px 0;
            padding: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s; 
            color: var(--text);
        }
        #userInfoDisplay p:hover {
            background-color: var(--secondary-bg); 
            border-radius: 5px;
        }
        #userInfoDisplay .menu-item-primary {
            color: var(--primary); 
            font-weight: bold;
        }
        #userInfoDisplay .menu-item-adult {
            font-weight: bold;
            color: var(--danger-color); /* Cor para indicar perigo/alerta */
        }
        #userInfoDisplay .menu-item-adult.active {
            color: var(--success-color); /* Verde quando ativo */
        }
        /* Estilos para o player de vídeo */
        #videoPlayerModal {
            padding: 20px;
            text-align: center;
        }
        #videoPlayerModal iframe {
            width: 100%;
            max-width: 800px;
            height: 450px;
            border: none;
            margin-top: 15px;
        }
        #videoPlayerModal .anime-title {
            color: var(--primary);
            margin-bottom: 10px;
        }
        #videoPlayerModal .close-video-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 30px;
            cursor: pointer;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        /* Estilo para o botão de salvar/remover anime na página de detalhes */
        #btnSalvarAnime.saved {
            background-color: #007bff; /* Azul, para indicar que está salvo */
        }

        /* Novas Estilos para a Tela de Detalhes do Anime */
        #animeDetailsModal {
            display: none; /* Esconde por padrão */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 5000;
            justify-content: center;
            align-items: center;
            overflow-y: auto; /* Permite scroll se o conteúdo for muito grande */
            padding: 20px;
        }
        #animeDetailsModal .modal-card {
            max-width: 900px;
            width: 95%;
            padding: 20px;
            text-align: left;
        }
        #animeDetailsModal .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 30px;
            color: var(--text);
            background: none;
            border: none;
            cursor: pointer;
        }
        #animeDetailsModal img.cover {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        #animeDetailsModal h3 {
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
        }
        #animeDetailsModal p {
            margin-bottom: 10px;
        }
        .episode-list-container {
            max-height: 200px; /* Altura máxima para a lista de episódios */
            overflow-y: auto; /* Adiciona scroll se necessário */
            border: 1px solid #333;
            border-radius: 5px;
            padding: 10px;
            margin-top: 20px;
            background-color: var(--secondary-bg);
        }
        .episode-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            padding: 0;
            margin: 0;
        }
        .episode-button {
            background: var(--card);
            color: var(--text);
            padding: 10px;
            border: 1px solid var(--primary);
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            text-align: center;
            font-weight: bold;
        }
        .episode-button:hover, .episode-button.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Estilos para o Player de Vídeo dentro do modal de detalhes */
        #detailsVideoPlayer {
            width: 100%;
            aspect-ratio: 16/9; /* Proporção de vídeo comum */
            border: none;
            margin-top: 20px;
            background-color: black;
        }
        .player-controls {
            display: flex;
            flex-wrap: wrap; /* Permite que os itens quebrem linha */
            justify-content: space-between;
            align-items: center;
            gap: 10px; /* Espaço entre os grupos de botões */
            margin-top: 15px;
        }
        .player-controls button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .player-controls button:hover {
            background-color: #4a00af;
        }
        .player-controls .player-toggle-group {
            display: flex;
            gap: 5px;
        }
        .player-controls .player-toggle-group button {
             background: var(--secondary-bg);
             border: 1px solid var(--primary);
             color: var(--text);
        }
        .player-controls .player-toggle-group button.active {
            background: var(--primary);
            color: white;
        }
        .player-controls .player-report-btn {
            background: var(--danger-color);
            /* Removido margin-left: auto; para melhor responsividade com flex-wrap */
        }
        .player-controls .player-report-btn:hover {
            background-color: #cc0000;
        }

        /* Comentários e Avaliações */
        .comments-section, .rating-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .comments-section h4, .rating-section h4 {
            color: var(--primary);
            margin-bottom: 15px;
        }
        #commentInput {
            min-height: 80px;
            resize: vertical;
        }
        .comment-item {
            background: var(--secondary-bg);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .comment-item p {
            margin: 0;
            color: var(--text);
        }
        .comment-item .comment-meta {
            font-size: 0.8em;
            color: gray;
            margin-top: 5px;
        }
        .rating-stars {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            justify-content: center; /* Centraliza as estrelas */
        }
        .rating-stars .star {
            font-size: 2em;
            cursor: pointer;
            color: gray;
            transition: color 0.2s;
        }
        .rating-stars .star.selected,
        .rating-stars .star:hover { /* Destaca a estrela ao passar o mouse */
            color: gold;
        }
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            align-items: center;
        }
        .navigation-buttons button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
        }
        .navigation-buttons button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .navigation-buttons .middle-btn {
            background: var(--secondary-bg);
            color: var(--text);
            border: 1px solid var(--primary);
        }
        .navigation-buttons .middle-btn:hover {
            background: var(--primary);
            color: white;
        }

    </style>
</head>
<body>

<header>
    <!-- Botão do hambúrguer que agora abre o menu do usuário -->
    <button class="icon-btn" id="openUserMenuBtn">☰</button>
    <div class="logo">AnimesOracle</div>
    <!-- Botão de adicionar anime (permanece o mesmo) -->
    <button class="icon-btn" id="openPostarModalBtn">➕</button>
</header>

<!-- Menu Alfabético -->
<div class="alphabet-menu" id="alphabetMenu">
    <!-- Botões das letras serão gerados via JS -->
</div>

<!-- Seções de Destaque -->
<div class="featured-section">
    <h2>Animes Mais Assistidos</h2>
    <div class="featured-grid" id="mostViewedAnimes">
        <!-- Animes mais assistidos serão carregados aqui -->
    </div>
</div>

<div class="featured-section">
    <h2>Animes Mais Votados</h2>
    <div class="featured-grid" id="topRatedAnimes">
        <!-- Animes mais votados serão carregados aqui -->
    </div>
</div>

<div class="grid-recent" id="animeGrid"></div>

<!-- Modal para Postar Anime -->
<div id="postarModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin:0 0 10px 0;">Postar Novo Anime</h3>
        <input type="text" id="pNome" placeholder="Nome do Anime">
        <input type="text" id="pCapa" placeholder="Link da Imagem (Capa do Anime)">
        <input type="text" id="pCapaTemporada" placeholder="Link da Imagem (Capa da Temporada)">
        <input type="text" id="pLink" placeholder="Link do Vídeo (Embed do YouTube/Drive, etc.) - EP 1">
        <input type="number" id="pEpisodio" placeholder="Número do Episódio (Ex: 1)" value="1">
        <input type="text" id="pTemporada" placeholder="Nome/Número da Temporada (Ex: Temporada 1)">
        <label for="pIsAdult" style="display:block; margin: 10px 0 5px;">
            <input type="checkbox" id="pIsAdult" style="width: auto; margin-right: 5px;"> É +18?
        </label>
        <label for="pType" style="display:block; margin: 5px 0 10px;">
            Idioma: 
            <select id="pType" style="padding: 8px; background: var(--secondary-bg); border: 1px solid #333; color: var(--text); border-radius: 5px;">
                <option value="legendado">Legendado</option>
                <option value="dublado">Dublado</option>
            </select>
        </label>
        <button class="btn-post" id="salvarAnimeBtn">PUBLICAR</button>
        <button class="cancel-btn" id="closePostarModalBtn">Cancelar</button>
    </div>
</div>

<!-- Modal de Autenticação (Login/Cadastro) -->
<div id="authModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin:0 0 10px 0;">Entrar / Cadastrar</h3>
        <input type="email" id="authEmail" placeholder="E-mail">
        <input type="password" id="authPassword" placeholder="Senha">
        <input type="text" id="authPseudonimo" placeholder="Pseudônimo (Opcional)">
        <button class="btn-post" id="cadastrarUsuarioBtn">CADASTRAR</button>
        <button class="btn-post" id="loginUsuarioBtn" style="margin-top: 10px;">ENTRAR</button>
        <button class="cancel-btn" id="closeAuthModalBtn">Cancelar</button>
    </div>
</div>

<!-- Menu do Usuário (Sidebar) -->
<div id="userMenu" class="modal">
    <div class="modal-card">
        <button class="close-btn" id="closeUserMenuBtn">&times;</button>
        <div id="userInfoDisplay">
            <!-- Conteúdo do usuário será carregado aqui pelo JavaScript -->
        </div>
        <hr style="border-color:#333; margin:15px 0;">
        <button id="logoutUsuarioBtn" class="btn-post" style="background:var(--danger-color);">Sair</button>
    </div>
</div>

<!-- Modal de Detalhes do Anime e Player de Episódios -->
<div id="animeDetailsModal" class="modal">
    <div class="modal-card">
        <button class="close-btn" id="closeAnimeDetailsModalBtn">&times;</button>
        <img id="detailsAnimeCover" class="cover" src="" alt="Capa do Anime">
        <h3 id="detailsAnimeTitle"></h3>
        <p id="detailsAnimeSeason"></p>

        <!-- Player de Vídeo principal para o episódio selecionado -->
        <iframe id="detailsVideoPlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        
        <!-- Controles do Player: Player 1/2/3, Legendado/Dublado, Reportar -->
        <div class="player-controls">
            <div class="player-toggle-group" id="playerSelection">
                <!-- Botões de Player 1, Player 2, etc. serão gerados via JS -->
            </div>
            <div class="player-toggle-group" id="languageSelection">
                <button id="btnLegendado" class="active">Legendado</button>
                <button id="btnDublado">Dublado</button>
            </div>
            <button class="player-report-btn" id="btnReportarEpisodio">Reportar</button>
        </div>

        <!-- Navegação de Episódios -->
        <div class="navigation-buttons">
            <button id="prevEpisodeBtn">&lt;</button>
            <button id="episodeListBtn">Lista de Episódios</button>
            <button id="nextEpisodeBtn">&gt;</button>
        </div>

        <!-- Lista de Episódios (visível ao clicar em "Lista de Episódios") -->
        <div class="episode-list-container" id="allEpisodesList" style="display:none;">
            <h4>Todos os Episódios:</h4>
            <div class="episode-list" id="currentAnimeEpisodeList">
                <!-- Episódios serão carregados aqui -->
            </div>
        </div>

        <!-- Comentários e Avaliações -->
        <div class="rating-section">
            <h4>Avaliar Temporada:</h4>
            <div class="rating-stars" id="animeRatingStars">
                <!-- Estrelas de 1 a 10 serão geradas via JS -->
            </div>
        </div>

        <div class="comments-section">
            <h4>Comentários:</h4>
            <textarea id="commentInput" placeholder="Escreva seu comentário..."></textarea>
            <button class="btn-post" id="postCommentBtn">Publicar Comentário</button>
            <div id="commentsList">
                <!-- Comentários serão carregados aqui -->
            </div>
        </div>
    </div>
</div>
