<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimesOracle</title>
    
    <!-- SCRIPTS CARREGADOS DE FORMA MAIS RESISTENTE -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --bg: #0f0f0f; --text: #ffffff; --primary: #6200ea; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; height: 60px; border-bottom: 2px solid #222; }
        .loading { padding: 50px; text-align: center; color: var(--primary); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #1a1a1a; border: 1px solid var(--primary); border-radius: 8px; overflow: hidden; text-align: center; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
    </style>
</head>
<body>

<div id="loader" class="loading">Iniciando AnimesOracle... <br><small>Se demorar, recarregue a página.</small></div>

<div id="app" style="display:none;">
    <header>
        <button onclick="document.getElementById('menu').style.display='block'" style="color:white; background:none; border:none; font-size:24px;">☰</button>
        <div style="color:var(--primary); font-weight:bold;">AnimesOracle</div>
        <button onclick="postar()" style="color:white; background:none; border:none; font-size:24px;">➕</button>
    </header>

    <div id="menu" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; padding:20px; box-sizing:border-box;">
        <button onclick="document.getElementById('menu').style.display='none'" style="color:white; float:right; background:none; border:none; font-size:24px;">X</button>
        <div id="authBox">
            <h3>Login / Cadastro</h3>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha (6+ dígitos)">
            <button class="btn" onclick="login()">ENTRAR / CADASTRAR</button>
        </div>
        <div id="userBox" style="display:none">
            <p id="uMail"></p>
            <button class="btn" style="background:red;" onclick="firebase.auth().signOut().then(()=>location.reload())">Sair</button>
        </div>
    </div>

    <div class="grid" id="grid"></div>
</div>

<script>
    const config = { 
        apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw", 
        authDomain: "://firebaseapp.com", 
        projectId: "animesoracle-a60e9", 
        storageBucket: "animesoracle-a60e9.firebasestorage.app", 
        appId: "1:751657326717:web:67ef63d01ffa3ad044f914" 
    };

    // FUNÇÃO QUE TENTA INICIALIZAR ATÉ CONSEGUIR
    function checkFirebase() {
        if (typeof firebase !== 'undefined' && typeof firebase.auth === 'function') {
            firebase.initializeApp(config);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            
            const db = firebase.firestore();
            const auth = firebase.auth();

            auth.onAuthStateChanged(user => {
                if(user) {
                    document.getElementById('authBox').style.display = 'none';
                    document.getElementById('userBox').style.display = 'block';
                    document.getElementById('uMail').innerText = "Logado como: " + user.email;
                }
            });

            db.collection("animes").orderBy("data", "desc").onSnapshot(snap => {
                const g = document.getElementById('grid'); g.innerHTML = "";
                snap.forEach(doc => {
                    const a = doc.data();
                    g.innerHTML += `<div class="card"><img src="${a.capa}"><div>${a.nome}</div></div>`;
                });
            });
        } else {
            setTimeout(checkFirebase, 1000); // Tenta de novo em 1 segundo
        }
    }

    checkFirebase();

    async function login() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('pass').value;
        if(!e || s.length < 6) return alert("E-mail ou senha inválidos!");

        try {
            await firebase.auth().signInWithEmailAndPassword(e, s);
            alert("Sucesso!");
            document.getElementById('menu').style.display = 'none';
        } catch (error) {
            if (error.code === 'auth/user-not-found') {
                firebase.auth().createUserWithEmailAndPassword(e, s)
                    .then(() => alert("Conta criada!"))
                    .catch(err => alert("Erro: " + err.message));
            } else { alert("Erro: " + error.message); }
        }
    }

    function postar() {
        if(!firebase.auth().currentUser) return alert("Logue primeiro!");
        const n = prompt("Nome:"); const c = prompt("Link Capa:"); const l = prompt("Link Vídeo:");
        if(n && c && l) {
            firebase.firestore().collection("animes").add({
                nome: n, capa: c, link: l, data: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert("Postado!"));
        }
    }
</script>
</body>
</html>
