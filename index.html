<script type="module">
    // 1. IMPORTAÇÕES (Links completos para evitar erros de comunicação)
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://gstatic.com";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://gstatic.com";

    const firebaseConfig = {
      apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw",
      authDomain: "://firebaseapp.com",
      projectId: "animesoracle-a60e9",
      storageBucket: "animesoracle-a60e9.firebasestorage.app",
      messagingSenderId: "751657326717",
      appId: "1:751657326717:web:67ef63d01ffa3ad044f914"
    };

    // 2. FUNÇÕES DE INTERFACE (FORA DO FIREBASE PARA RESPONDER NA HORA)
    // Isso garante que o Menu e a Busca funcionem mesmo se o Firebase falhar
    window.toggleMenu = () => {
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        if(menu) menu.classList.toggle('active');
        if(overlay) overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
    };

    window.toggleSearch = () => {
        const box = document.getElementById('searchBox');
        if(box) box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    };

    // 3. INICIALIZAÇÃO DO FIREBASE (DENTRO DE UM TRY/CATCH PARA NÃO TRAVAR O SITE)
    try {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fazerLogin = async () => {
            const email = prompt("E-mail:");
            const senha = prompt("Senha:");
            if(!email || !senha) return;
            try {
                await signInWithEmailAndPassword(auth, email, senha);
                alert("Logado!");
            } catch (e) {
                const nome = prompt("Conta nova! Digite seu nome:");
                if(nome) {
                    const res = await createUserWithEmailAndPassword(auth, email, senha);
                    await setDoc(doc(db, "usuarios", res.user.uid), { nome: nome });
                    alert("Cadastrado!");
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            const display = document.getElementById('userNameDisplay');
            if (user) {
                const d = await getDoc(doc(db, "usuarios", user.uid));
                display.innerText = d.exists() ? d.data().nome : user.email;
            }
        });
    } catch (err) {
        console.error("Erro de conexão Firebase:", err);
    }

    // 4. FUNÇÕES DE PLAYER E POSTAR
    window.abrirPostar = () => document.getElementById('postarModal').style.display = 'flex';
    window.fecharPostar = () => document.getElementById('postarModal').style.display = 'none';
    window.fecharPlayer = () => document.getElementById('animePlayerPage').style.display = 'none';
</script>
