<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimesOracle</title>
    
    <!-- BIBLIOTECAS FIREBASE (VERSÃO ESTÁVEL 8.10.0) -->
    <!-- Essencial para o Firebase funcionar -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Para o banco de dados Firestore -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <!-- Para autenticação de usuários (e-mail/senha) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        /* Estilos Globais e do Tema */
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --primary: #6200ea; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }

        /* Estilos do Header */
        header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            background: #000; 
            height: 60px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333; 
        }
        .logo { 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 20px; 
            flex-grow: 1; 
            text-align: center; 
        }
        .icon-btn { 
            font-size: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: var(--primary); 
            outline: none; 
            padding: 0 5px; /* Adicionado para melhor toque */
        }

        /* Estilos da Grade de Animes */
        .grid-recent { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 15px; 
        }
        .card-recent { 
            background: var(--card); 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #333; 
            text-align: center; 
        }
        .card-recent img { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            cursor: pointer; 
            display: block; 
        }
        .card-info { 
            padding: 8px; 
            font-size: 13px; 
            font-weight: bold; 
        }

        /* Estilos Comuns para Modais (pop-ups) */
        .modal { 
            display: none; /* Escondido por padrão */
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 5000; 
            justify-content: center; 
            align-items: center; 
        }
        .modal-card { 
            background: #1a1a1a; 
            padding: 25px; 
            border-radius: 15px; 
            width: 85%; 
            max-width: 400px; 
            border: 1px solid var(--primary); 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #222; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 5px; 
            box-sizing: border-box; 
        }
        .btn-post { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
        }

        /* Estilos Específicos para o Menu do Usuário (Sidebar) */
        #userMenu {
            justify-content: flex-start; /* Alinha o menu à esquerda da tela */
            align-items: stretch; /* Ocupa toda a altura */
            background: rgba(0,0,0,0.7); /* Fundo um pouco mais transparente para o menu */
        }
        #userMenu .modal-card {
            width: 280px; /* Largura da sidebar */
            max-width: 80%; /* Para telas menores, não ultrapassa 80% da largura */
            height: 100%; /* Ocupa a altura total da tela */
            border-radius: 0 15px 15px 0; /* Bordas arredondadas apenas na direita */
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); /* Sombra para dar profundidade */
            display: flex;
            flex-direction: column; /* Organiza os itens verticalmente */
            overflow-y: auto; /* Adiciona rolagem se o conteúdo for muito grande */
            position: relative; /* Para posicionar o botão de fechar */
        }
        #userMenu .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            position: absolute; /* Posição absoluta dentro do modal-card */
            right: 15px;
            top: 10px;
            z-index: 5001; /* Garante que o botão esteja acima de outros elementos */
        }
        #userInfoDisplay {
            text-align: center; 
            margin-top: 30px; /* Espaço para o botão de fechar */
        }
        #userInfoDisplay img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 2px solid var(--primary); /* Borda roxa ao redor da foto */
        }
        #userInfoDisplay p {
            margin: 8px 0;
            padding: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease; /* Efeito suave ao passar o mouse */
        }
        #userInfoDisplay p:hover {
            background-color: #2a2a2a; /* Fundo mais escuro ao passar o mouse */
            border-radius: 5px;
        }
        #userInfoDisplay .menu-item-primary {
            color: var(--primary); /* Texto roxo para "Animes Salvos" */
            font-weight: bold;
        }
        #userInfoDisplay .menu-item-adult {
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <!-- Botão do hambúrguer que agora abre o menu do usuário -->
    <button class="icon-btn" onclick="abrirMenuUsuario()">☰</button>
    <div class="logo">AnimesOracle</div>
    <!-- Botão de adicionar anime (permanece o mesmo) -->
    <button class="icon-btn" onclick="document.getElementById('postarModal').style.display='flex'">➕</button>
</header>

<div class="grid-recent" id="animeGrid"></div>

<!-- Modal para Postar Anime (EXISTENTE) -->
<div id="postarModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin:0 0 10px 0;">Postar Anime</h3>
        <input type="text" id="pNome" placeholder="Nome do Anime">
        <input type="text" id="pCapa" placeholder="Link da Imagem (Capa)">
