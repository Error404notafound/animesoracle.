<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimesOracle</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --primary: #6200ea; --brightness: 100%; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; filter: brightness(var(--brightness)); overflow-x: hidden; }
        
        /* HEADER & BUSCA */
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; height: 60px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--primary); }
        .logo { font-weight: bold; color: var(--primary); font-size: 20px; text-align: center; flex-grow: 1; }
        .icon-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--primary); padding: 5px; }
        #searchWrapper { display: none; padding: 10px; background: #000; border-bottom: 1px solid var(--primary); }
        #searchWrapper input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid var(--primary); background: #222; color: white; box-sizing: border-box; }

        /* MENU A-Z */
        .abc-menu { display: flex; overflow-x: auto; background: #111; padding: 12px; gap: 15px; scrollbar-width: none; border-bottom: 1px solid #222; }
        .abc-menu::-webkit-scrollbar { display: none; }
        .abc-menu span { color: var(--primary); cursor: pointer; font-weight: bold; min-width: 20px; text-align: center; }

        /* SLIDER (MAIS VOTADOS) */
        .section-title { padding: 15px 10px 5px; font-size: 13px; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        .slider { display: flex; overflow-x: auto; gap: 12px; padding: 10px; scrollbar-width: none; }
        .slider-card { min-width: 130px; background: var(--card); border-radius: 8px; border: 1px solid var(--primary); overflow: hidden; position: relative; }
        .slider-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .rating-badge { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: gold; padding: 2px 5px; border-radius: 4px; font-size: 10px; }

        /* GRID RECENTES */
        .grid-recent { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card-anime { background: var(--card); border-radius: 8px; overflow: hidden; font-size: 12px; border-bottom: 2px solid var(--primary); }
        .card-anime img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }

        /* MENU HAMBURGUER LATERAL */
        .side-menu { position: fixed; left: -100%; top: 0; width: 85%; max-width: 300px; height: 100%; background: #111; z-index: 2000; transition: 0.3s; overflow-y: auto; }
        .side-menu.active { left: 0; }
        .profile-box { padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; }
        .user-pic { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; margin-bottom: 10px; }
        .menu-link { display: block; padding: 15px 20px; color: white; text-decoration: none; border-bottom: 1px solid #222; font-size: 14px; }
        
        /* MODAIS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-card { background: #1a1a1a; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; }
    </style>
</head>
<body>

<header>
    <button class="icon-btn" onclick="toggleMenu()">☰</button>
    <div class="logo">AnimesOracle</div>
    <div style="display:flex; gap:10px;">
        <button class="icon-btn" onclick="abrirPostar()">➕</button>
        <button class="icon-btn" onclick="toggleSearch()">🔍</button>
    </div>
</header>

<div id="searchWrapper"><input type="text" id="mainSearch" placeholder="Pesquisar anime..."></div>

<div class="abc-menu" id="abcContainer"></div>

<div id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <div class="profile-box">
        <img src="https://flaticon.com" class="user-pic" id="sideUserPic">
        <h3 id="sideUserName">Visitante</h3>
        <button onclick="triggerLogin()" id="authBtn" style="background:var(--primary); border:none; color:white; padding:8px 15px; border-radius:4px; font-size:12px;">Login / Cadastro</button>
    </div>
    <a href="#" class="menu-link">Animes Dublados</a>
    <a href="#" class="menu-link">Animes Legendados</a>
    <a href="#" class="menu-link">Episódios</a>
    <a href="#" class="menu-link">Gêneros</a>
    
    <div id="userSettings" style="display:none; padding:20px;">
        <p style="font-size:12px; color:var(--primary);">CONFIGURAÇÕES</p>
        <label style="font-size:12px;">Brilho:</label>
        <input type="range" min="20" max="100" value="100" oninput="ajustarBrilho(this.value)">
        <label style="display:flex; align-items:center; gap:10px; margin-top:15px; font-size:12px;">
            <input type="checkbox" id="adultMode"> Modo Adulto (+18)
        </label>
        <button onclick="updateProfile()" style="margin-top:20px; background:none; border:1px solid #444; color:#aaa; width:100%; padding:5px;">Editar Perfil</button>
    </div>
</div>

<div id="postarModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin-top:0;">Postar Anime</h3>
        <input type="text" id="pNome" placeholder="Nome do Anime">
        <input type="text" id="pCapa" placeholder="URL da Imagem de Capa">
        <input type="text" id="pLink" placeholder="Link do Vídeo (Player)">
        <select id="pRating">
            <option value="">Avalie este anime (1 a 10)</option>
            <script>for(let i=10; i>=1; i--) document.write(`<option value="${i}">${i}</option>`);</script>
        </select>
        <button class="btn-main" onclick="salvarPost()">PUBLICAR</button>
        <button onclick="fecharPostar()" style="background:none; border:none; color:#777; width:100%; margin-top:10px;">Cancelar</button>
    </div>
</div>

<div class="section-title">⭐ Mais Votados e Assistidos</div>
<div class="slider" id="sliderTop"></div>

<div class="section-title">🆕 Adicionados Recentemente</div>
<div class="grid-recent" id="gridRecent"></div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile as updateFBProfile } from "https://gstatic.com";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc, getDoc, where } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw",
        authDomain: "://firebaseapp.com",
        projectId: "animesoracle-a60e9",
        storageBucket: "animesoracle-a60e9.firebasestorage.app",
        messagingSenderId: "751657326717",
        appId: "1:751657326717:web:67ef63d01ffa3ad044f914"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // FUNÇÕES DE INTERFACE
    window.toggleMenu = () => {
        const m = document.getElementById('sideMenu');
        m.classList.toggle('active');
        document.getElementById('overlay').style.display = m.classList.contains('active') ? 'block' : 'none';
    };
    window.toggleSearch = () => {
        const s = document.getElementById('searchWrapper');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
        if(s.style.display === 'block') document.getElementById('mainSearch').focus();
    };
    window.abrirPostar = () => {
        if(!auth.currentUser) return alert("Faça login para postar!");
        document.getElementById('postarModal').style.display = 'flex';
    };
    window.fecharPostar = () => document.getElementById('postarModal').style.display = 'none';
    window.ajustarBrilho = (v) => document.documentElement.style.setProperty('--brightness', v + '%');

    // LOGIN / CADASTRO
    window.triggerLogin = async () => {
        if(auth.currentUser) return signOut(auth);
        const email = prompt("E-mail:");
        const senha = prompt("Senha (min. 6 dígitos):");
        if(!email || !senha) return;
        try {
            await signInWithEmailAndPassword(auth, email, senha);
        } catch (e) {
            const nome = prompt("Conta não encontrada. Digite seu NOME para criar conta:");
            if(nome) {
                const res = await createUserWithEmailAndPassword(auth, email, senha);
                await setDoc(doc(db, "usuarios", res.user.uid), { nome: nome, foto: "" });
                alert("Cadastrado com sucesso!");
            }
        }
    };

    window.updateProfile = async () => {
        const novoNome = prompt("Novo Nome:");
        const novaFoto = prompt("URL da sua Foto (opcional):");
        if(novoNome) {
            await setDoc(doc(db, "usuarios", auth.currentUser.uid), { nome: novoNome, foto: novaFoto }, {merge: true});
            location.reload();
        }
    };

    // POSTAGEM
    window.salvarPost = async () => {
        const nome = document.getElementById('pNome').value;
        const link = document.getElementById('pLink').value;
        const capa = document.getElementById('pCapa').value || 'https://placeholder.com';
        const nota = document.getElementById('pRating').value;

        if(!nome || !link || !nota) return alert("Preencha Nome, Link e Nota!");

        try {
            await addDoc(collection(db, "animes"), {
                nome: nome,
                nomeBusca: nome.toLowerCase(),
                link: link,
                capa: capa,
                nota: parseInt(nota),
                autor: auth.currentUser.uid,
                data: Date.now(),
                adulto: document.getElementById('adultMode').checked
            });
            fecharPostar();
            alert("Anime Oracle postado!");
        } catch (e) { alert(e.message); }
    };

    // MONITORAR ESTADO
    onAuthStateChanged(auth, async (user) => {
        const nameDisp = document.getElementById('sideUserName');
        const picDisp = document.getElementById('sideUserPic');
        const authBtn = document.getElementById('authBtn');
        const settings = document.getElementById('userSettings');

        if (user) {
            const d = await getDoc(doc(db, "usuarios", user.uid));
            if(d.exists()) {
                nameDisp.innerText = d.data().nome;
                if(d.data().foto) picDisp.src = d.data().foto;
            }
            authBtn.innerText = "Sair / Logout";
            settings.style.display = "block";
        } else {
            nameDisp.innerText = "Visitante";
            picDisp.src = "https://flaticon.com";
            authBtn.innerText = "Login / Cadastro";
            settings.style.display = "none";
        }
    });

    // CARREGAR ANIMES
    onSnapshot(query(collection(db, "animes"), orderBy("data", "desc")), (snap) => {
        const grid = document.getElementById('gridRecent');
        const slider = document.getElementById('sliderTop');
        grid.innerHTML = ""; slider.innerHTML = "";
        
        let animesRaw = [];
        snap.forEach(d => animesRaw.push({...d.data(), id: d.id}));

        // Renderizar Recentes
        animesRaw.forEach(a => {
            grid.innerHTML += `
                <div class="card-anime" onclick="window.open('${a.link}', '_blank')">
                    <img src="${a.capa}">
                    <div style="padding:8px"><b>${a.nome}</b><br><small>⭐ ${a.nota}/10</small></div>
                </div>`;
        });

        // Renderizar Slider (Top Notas)
        const topAnimes = [...animesRaw].sort((a,b) => b.nota - a.nota);
        topAnimes.slice(0, 10).forEach(a => {
            slider.innerHTML += `
                <div class="slider-card" onclick="window.open('${a.link}', '_blank')">
                    <div class="rating-badge">⭐ ${a.nota}</div>
                    <img src="${a.capa}">
                </div>`;
        });
    });

    // BUSCA E MENU A-Z
    const buscar = (termo) => {
        const t = termo.toLowerCase();
        document.querySelectorAll('.card-anime').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(t) ? 'block' : 'none';
        });
    };

    document.getElementById('mainSearch').oninput = (e) => buscar(e.target.value);

    const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    const cont = document.getElementById('abcContainer');
    abc.forEach(l => {
        const el = document.createElement('span');
        el.innerText = l;
        el.onclick = () => {
            document.getElementById('mainSearch').value = l;
            buscar(l);
        };
        cont.appendChild(el);
    });
</script>
</body>
</html>
