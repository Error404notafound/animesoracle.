<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimesOracle</title>
    
    <!-- Bibliotecas Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root {
            --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; 
            --primary: #6200ea; --brightness: 100%;
        }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
            filter: brightness(var(--brightness));
        }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; background: #000; height: 60px; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: bold; color: var(--primary); font-size: 20px; flex-grow: 1; text-align: center; }
        .icon-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--primary); }
        
        .grid-recent { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .card-recent { background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .card-recent img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 8px; font-size: 13px; text-align: center; }

        /* MENU LATERAL */
        .side-menu {
            position: fixed; left: -100%; top: 0; width: 80%; max-width: 300px;
            height: 100%; background: #151515; z-index: 2000; transition: 0.3s; padding: 20px;
        }
        .side-menu.active { left: 0; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; }

        /* MODAIS */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center;
        }
        .modal-card { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box;}
        .btn-post { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <button class="icon-btn" onclick="toggleMenu()">☰</button>
    <div class="logo">AnimesOracle</div>
    <div style="display: flex; gap: 15px;">
        <button class="icon-btn" onclick="abrirPostar()">➕</button>
    </div>
</header>

<div id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <h3 style="color:var(--primary)">Menu</h3>
    <nav class="nav-links">
        <p>Animes Dublados</p>
        <p>Animes Legendados</p>
    </nav>
</div>

<div class="grid-recent" id="animeGrid"></div>

<div id="postarModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin:0;">Postar Anime</h3>
        <input type="text" id="pNome" placeholder="Nome do Anime">
        <input type="text" id="pCapa" placeholder="Link da Imagem (Capa)">
        <input type="text" id="pLink" placeholder="Link do Vídeo">
        <button class="btn-post" onclick="salvarAnime()">PUBLICAR</button>
        <button onclick="fecharPostar()" style="background:none; color:gray; border:none; margin-top:10px; width:100%; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
    // Configuração do seu Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw",
      authDomain: "://firebaseapp.com",
      projectId: "animesoracle-a60e9",
      storageBucket: "animesoracle-a60e9.firebasestorage.app",
      messagingSenderId: "751657326717",
      appId: "1:751657326717:web:67ef63d01ffa3ad044f914"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function toggleMenu() {
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        menu.classList.toggle('active');
        overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
    }

    function abrirPostar() { document.getElementById('postarModal').style.display = 'flex'; }
    function fecharPostar() { document.getElementById('postarModal').style.display = 'none'; }

    async function salvarAnime() {
        const nome = document.getElementById('pNome').value;
        const capa = document.getElementById('pCapa').value;
        const link = document.getElementById('pLink').value;

        if (!nome || !capa) return alert("Preencha nome e capa!");

        try {
            await db.collection("animes").add({ nome, capa, link, data: new Date() });
            alert("Anime postado!");
            fecharPostar();
        } catch (e) {
            alert("Erro: Verifique as regras do Firestore Database!");
        }
    }

    function carregarAnimes() {
        db.collection("animes").orderBy("data", "desc").onSnapshot((querySnapshot) => {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const anime = doc.data();
                grid.innerHTML += `
                    <div class="card-recent">
                        <img src="${anime.capa}" onclick="window.open('${anime.link}', '_blank')">
                        <div class="card-info">${anime.nome}</div>
                    </div>`;
            });
        });
    }

    carregarAnimes();
</script>
</body>
    </html>
