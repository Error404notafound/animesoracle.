<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimesOracle</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --primary: #6200ea; --brightness: 100%; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; filter: brightness(var(--brightness)); overflow-x: hidden; }
        
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; height: 60px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--primary); }
        .logo { font-weight: bold; color: var(--primary); font-size: 20px; flex-grow: 1; text-align: center; }
        .icon-btn { font-size: 26px; cursor: pointer; background: none; border: none; color: var(--primary); }

        .section-title { padding: 15px 10px 5px; font-size: 13px; color: #888; text-transform: uppercase; }
        
        /* GRID DE ANIMES */
        .grid-recent { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .card-recent { background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .card-recent:active { transform: scale(0.95); }
        .card-recent img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-info { padding: 8px; font-size: 13px; text-align: center; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; }
        .modal-card { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 85%; max-width: 400px; border: 1px solid var(--primary); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-main { width: 100%; background: var(--primary); border: none; color: white; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <button class="icon-btn" onclick="alert('Menu em breve')">☰</button>
    <div class="logo">AnimesOracle</div>
    <button class="icon-btn" onclick="abrirPostar()">➕</button>
</header>

<div class="section-title">Animes Adicionados</div>
<div class="grid-recent" id="animeGrid">
    <!-- Os animes aparecerão aqui -->
</div>

<div id="postarModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin-top:0;">Postar Anime</h3>
        <input type="text" id="pNome" placeholder="Nome do Anime (Ex: Naruto)">
        <input type="text" id="pLink" placeholder="Link da Imagem da Capa">
        <input type="text" id="pVideo" placeholder="ID ou Link do Vídeo">
        <button onclick="salvarAnime()" id="btnPostar" class="btn-main">Postar Agora</button>
        <button onclick="fecharPostar()" style="width:100%; background:transparent; border:none; color:gray; margin-top:10px;">Cancelar</button>
    </div>
</div>

<!-- SCRIPTS FIREBASE -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw",
        authDomain: "://firebaseapp.com",
        projectId: "animesoracle-a60e9",
        storageBucket: "animesoracle-a60e9.firebasestorage.app",
        messagingSenderId: "751657326717",
        appId: "1:751657326717:web:67ef63d01ffa3ad044f914"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function abrirPostar() { document.getElementById('postarModal').style.display = 'flex'; }
    function fecharPostar() { document.getElementById('postarModal').style.display = 'none'; }

    async function salvarAnime() {
        const nome = document.getElementById('pNome').value;
        const capa = document.getElementById('pLink').value;
        const video = document.getElementById('pVideo').value;
        const btn = document.getElementById('btnPostar');

        if(!nome || !capa) return alert("Preencha o nome e o link da capa!");

        btn.innerText = "Enviando...";
        btn.disabled = true;

        try {
            await db.collection("animes").add({
                nome: nome,
                capa: capa,
                video: video,
                dataPostagem: firebase.firestore.FieldValue.serverTimestamp()
            });
            fecharPostar();
            document.getElementById('pNome').value = "";
            document.getElementById('pLink').value = "";
            document.getElementById('pVideo').value = "";
        } catch (e) {
            alert("Erro ao postar! Verifique as 'Regras' no console do Firebase.");
        }
        btn.innerText = "Postar Agora";
        btn.disabled = false;
    }

    // LISTAR ANIMES EM TEMPO REAL
    db.collection("animes").orderBy("dataPostagem", "desc").onSnapshot((snapshot) => {
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = ""; 
        snapshot.forEach((doc) => {
            const anime = doc.data();
            grid.innerHTML += `
                <div class="card-recent" onclick="alert('Player em breve para: ${anime.nome}')">
                    <img src="${anime.capa}" onerror="this.src='https://placeholder.com'">
                    <div class="card-info">${anime.nome}</div>
                </div>
            `;
        });
    });
</script>

</body>
</html>
