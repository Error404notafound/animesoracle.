<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimesOracle</title>
    
    <!-- BIBLIOTECAS FIREBASE (VERSÃO ESTÁVEL 8.10.0) -->
    <!-- Essencial para o Firebase funcionar -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Para o banco de dados Firestore -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <!-- Para autenticação de usuários (e-mail/senha) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <!-- Adicionar Firebase Storage para foto de perfil -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        /* Estilos Globais e do Tema */
        :root { 
            --bg: #0f0f0f; 
            --card: #1a1a1a; 
            --text: #ffffff; 
            --primary: #6200ea; /* Roxo */
            --primary-light: #9c27b0; /* Roxo mais claro para hover/focus */
            --secondary-bg: #222;
            --highlight-glow: 0 0 10px var(--primary), 0 0 20px var(--primary); /* Efeito de luz roxa */
            --danger: #cc0000; /* Vermelho para ações de perigo */
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.6;
        }

        /* Modo Escuro/Claro */
        body.light-mode {
            --bg: #f0f0f0;
            --card: #ffffff;
            --text: #333333;
            --secondary-bg: #e0e0e0;
        }

        /* Utilidades para flexbox */
        .flex-row { display: flex; align-items: center; }
        .flex-col { display: flex; flex-direction: column; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .items-center { align-items: center; }
        .gap-2 { gap: 8px; } /* Espaçamento padrão */
        .gap-4 { gap: 16px; }

        /* Estilos do Header */
        header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            background: #000; 
            height: 60px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333; 
        }
        .logo { 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 20px; 
            flex-grow: 1; 
            text-align: center; /* Centraliza o logo */
        }
        .icon-btn { 
            font-size: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: var(--primary); 
            outline: none; 
            padding: 0 5px; 
            transition: color 0.2s, transform 0.2s;
        }
        .icon-btn:hover {
            color: var(--primary-light);
            transform: scale(1.1);
        }
        .icon-btn svg { /* Estilo para ícones SVG */
            width: 24px;
            height: 24px;
            fill: currentColor; /* Usa a cor do texto do botão */
        }

        /* Barra de Pesquisa */
        .search-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 10px 0;
            border-bottom: 1px solid #333; /* Linha divisória */
            background: var(--bg); /* Garante que não é transparente */
            z-index: 999; /* Fica acima do conteúdo, mas abaixo do header */
        }
        #searchBar { 
            width: 90%; 
            max-width: 600px;
            padding: 12px 15px; 
            background: var(--secondary-bg); 
            border: 1px solid #333; 
            color: var(--text); 
            border-radius: 25px; /* Cantos arredondados */
            box-sizing: border-box; 
            transition: box-shadow 0.3s ease-in-out, border-color 0.3s;
        }
        #searchBar.focused {
            border-color: var(--primary);
            box-shadow: var(--highlight-glow); /* Aura roxa */
        }
        #searchBar::placeholder { /* Cor do placeholder "Buscar..." */
            color: #888;
        }
        .search-close-btn { /* Botão 'X' para fechar a busca */
            position: absolute;
            right: 10%; /* Alinha com o final da barra de busca */
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--danger); /* Cor vermelha */
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        /* Catálogo A-Z */
        #azCatalog {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px 15px;
            background: var(--bg);
            border-bottom: 1px solid #333;
            z-index: 998;
            gap: 5px; /* Espaçamento entre as letras */
        }
        #azCatalog span {
            color: var(--primary); /* Letras roxas */
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            padding: 4px 8px;
            transition: background-color 0.2s, color 0.2s;
            border-radius: 4px;
        }
        #azCatalog span:hover {
            background-color: var(--primary);
            color: var(--text);
        }

        /* Conteúdo principal - Seções */
        .content-section {
            padding: 20px 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .section-header h2 {
            color: var(--text);
            font-size: 1.5em;
            margin: 0;
            padding-left: 10px; /* Espaço para o detalhe vermelho */
            position: relative;
        }
        .section-header h2::before { /* Detalhe vermelho ao lado do título */
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 80%;
            background-color: var(--danger);
            border-radius: 2px;
        }
        .see-more-btn {
            background-color: var(--danger);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background-color 0.2s;
        }
        .see-more-btn:hover {
            background-color: #a00;
        }

        /* Grid de Animes (Padrão) */
        .anime-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 12px; 
        }
        .anime-card { 
            background: var(--card); 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #333; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative; /* Para badges e brilhos */
            cursor: pointer;
        }
        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .anime-card img { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            display: block; 
        }
        .anime-card-info { 
            padding: 8px; 
            font-size: 13px; 
            font-weight: bold; 
            color: var(--text);
        }
        /* Destaque para "Mais Votados & Assistidos" */
        .anime-card.highlighted {
            box-shadow: var(--highlight-glow);
            border-color: var(--primary);
        }
        .anime-card.highlighted::before {
            content: 'MAIS VOTADOS & ASSISTIDOS';
            position: absolute;
            top: 0;
            left: 0;
            background-color: var(--primary);
            color: white;
            padding: 3px 6px;
            font-size: 0.7em;
            font-weight: bold;
            border-radius: 8px 0 8px 0;
            z-index: 10;
        }

                /* Estilos Comuns para Modais (pop-ups) */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 5000; 
            justify-content: center; 
            align-items: center; 
        }
        .modal-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px; 
            width: 85%; 
            max-width: 400px; 
            border: 1px solid var(--primary); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative; 
            overflow-y: auto; /* Permite scroll em modals longos */
            max-height: 90vh; /* Limita altura do modal para telas pequenas */
        }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: var(--secondary-bg); 
            border: 1px solid #333; 
            color: var(--text); 
            border-radius: 5px; 
            box-sizing: border-box; 
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(98, 0, 234, 0.5); /* Sombra mais suave para foco */
        }
        .btn-post { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-post:hover {
            background-color: var(--primary-light);
            transform: translateY(-1px);
        }
        .cancel-btn {
            background: none; 
            color: gray; 
            border: none; 
            margin-top:15px; 
            width:100%; 
            cursor:pointer;
            transition: color 0.2s;
        }
        .cancel-btn:hover {
            color: var(--text);
        }

        /* Estilos Específicos para o Menu do Usuário (Sidebar) */
        #userMenu {
            justify-content: flex-start; 
            align-items: stretch; 
            background: rgba(0,0,0,0.7); 
            transition: all 0.3s ease-in-out;
            opacity: 0;
            pointer-events: none; /* Desabilita cliques quando escondido */
        }
        #userMenu.open { /* Classe para abrir o menu */
            opacity: 1;
            pointer-events: all;
        }
        #userMenu .modal-card {
            width: 280px; 
            max-width: 80%; 
            height: 100%; 
            border-radius: 0 15px 15px 0; 
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); 
            display: flex;
            flex-direction: column; 
            overflow-y: auto; 
            position: relative; 
            background: var(--card); 
        }
        #userMenu .close-btn {
            background: none;
            border: none;
            color: var(--text); 
            font-size: 24px;
            cursor: pointer;
            position: absolute; 
            right: 15px;
            top: 10px;
            z-index: 5001; 
        }
        #userInfoDisplay {
            text-align: center; 
            margin-top: 30px; 
        }
        #userInfoDisplay img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 2px solid var(--primary); 
        }
        #userInfoDisplay p {
            margin: 8px 0;
            padding: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s; 
            color: var(--text);
        }
        #userInfoDisplay p:hover {
            background-color: var(--secondary-bg); 
            border-radius: 5px;
        }
        #userInfoDisplay .menu-item-primary {
            color: var(--primary); 
            font-weight: bold;
        }
        #userInfoDisplay .menu-item-adult {
            font-weight: bold;
            color: #ff4d4d; /* Cor para indicar perigo/alerta */
        }
        #userInfoDisplay .menu-item-adult.active {
            color: #4CAF50; /* Verde quando ativo */
        }
        
                /* Controles de luminosidade */
        .luminosity-control {
            margin-top: 15px;
            padding: 10px;
            background: var(--secondary-bg);
            border-radius: 8px;
        }
        .luminosity-control label {
            display: block;
            margin-bottom: 5px;
            color: var(--text);
            font-weight: bold;
        }
        .luminosity-control input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 8px;
            background: #d3d3d3;
            outline: none;
            opacity: 0.7;
            transition: opacity .2s;
            border-radius: 5px;
        }
        .luminosity-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        .luminosity-control input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }


        /* Estilos para o player de vídeo */
        #videoPlayerModal {
            padding: 20px;
            text-align: center;
            max-width: 900px; /* Aumenta a largura máxima para o player */
        }
        #videoPlayerModal iframe {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9; /* Proporção de vídeo padrão */
            height: auto; /* Ajusta a altura automaticamente */
            border: none;
            margin-top: 15px;
            background: #000; /* Fundo preto enquanto carrega */
        }
        #videoPlayerModal .anime-title {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        .close-video-btn { /* Botão 'X' para fechar o player */
            background: none;
            border: none;
            color: var(--text);
            font-size: 30px;
            cursor: pointer;
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 5001;
            transition: color 0.2s;
        }
        .close-video-btn:hover {
            color: var(--danger);
        }

        /* Estilo para o botão de salvar/remover anime na página de detalhes */
        #btnSalvarAnime.saved {
            background-color: #007bff; /* Azul, para indicar que está salvo */
        }

        /* Estilos do Player de Video Personalizado */
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            gap: 20px; /* Espaçamento entre os botões */
        }
        .player-controls .icon-btn {
            font-size: 2.2em; /* Ícones maiores para os controles do player */
            padding: 0;
            width: 44px; /* Tamanho para área de clique */
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .player-options {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .player-options button {
            background-color: var(--secondary-bg);
            color: var(--text);
            padding: 10px 20px;
            border: 1px solid #444;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .player-options button.active, .player-options button:hover {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .player-details-section {
            margin-top: 30px;
            text-align: left;
            background: var(--card);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .player-details-section h3 {
            color: var(--primary);
            margin-bottom: 15px;
        }
        .player-details-section p {
            color: var(--text);
            font-size: 0.95em;
            line-height: 1.5;
        }
        .player-details-section .genres span {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 0.8em;
        }
        
        /* Estilos para lista de Players (Player 1, Player 2) */
        .player-list-modal .modal-card {
            max-width: 500px;
        }
        .player-list-modal button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: var(--secondary-bg);
            color: var(--text);
            border: 1px solid #444;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: left;
        }
        .player-list-modal button:hover {
            background-color: var(--primary-light);
            border-color: var(--primary);
        }

        /* Estilos para os Comentários */
        .comments-section {
            margin-top: 30px;
            text-align: left;
            background: var(--card);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .comments-section h3 {
            color: var(--primary);
            margin-bottom: 15px;
        }
        .comment-item {
            border-bottom: 1px solid #333;
            padding: 15px 0;
        }
        .comment-item:last-child {
            border-bottom: none;
        }
        .comment-author {
            font-weight: bold;
            color: var(--text);
        }
        .comment-text {
            margin-top: 5px;
            color: #ccc;
        }
        .comment-actions button {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.9em;
            margin-right: 10px;
            transition: color 0.2s;
        }
        .comment-actions button:hover {
            color: var(--primary-light);
        }
        .comment-form {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .comment-form textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* Estilos para o formulário de Postar Anime/Episódio */
        #postarModal .modal-card, #addEpisodeModal .modal-card {
            max-width: 550px;
        }
        #postarModal .form-group, #addEpisodeModal .form-group {
            margin-bottom: 15px;
        }
        #postarModal label, #addEpisodeModal label {
            display: block;
            margin-bottom: 5px;
            color: var(--text);
            font-weight: bold;
        }
        #postarModal input[type="checkbox"], #addEpisodeModal input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            vertical-align: middle;
        }
        #postarModal select, #addEpisodeModal select {
            width: 100%;
        }
        #postarModal textarea, #addEpisodeModal textarea {
            width: 100%;
            min-height: 100px;
            resize: vertical;
        }
        /* Estilos para upload de imagem de perfil */
        .profile-pic-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
        .profile-pic-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--secondary-bg);
            border: 2px solid var(--primary);
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .profile-pic-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-pic-upload-area input[type="file"] {
            display: none; /* Esconde o input file padrão */
        }
        .custom-file-upload {
            border: 1px solid var(--primary);
            display: inline-block;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
            color: var(--primary);
            transition: background-color 0.2s, color 0.2s;
        }
        .custom-file-upload:hover {
            background-color: var(--primary);
            color: white;
        }

    </style>
</head>
<body>

<header>
    <!-- Botão do hambúrguer que agora abre o menu do usuário -->
    <button class="icon-btn" onclick="toggleUserMenu()">
        <!-- Ícone de hambúrguer SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <div class="logo">AnimesOracle</div>
    <!-- Botão de pesquisa -->
    <button class="icon-btn" onclick="toggleSearchBar()">
        <!-- Ícone de lupa SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
    <!-- Botão de adicionar anime (AGORA COM ÍCONE +) -->
    <button class="icon-btn" onclick="openPostAnimeModal()">
        <!-- Ícone de mais SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
</header>

<!-- Barra de Pesquisa (Escondida por padrão) -->
<div id="searchContainer" class="search-container" style="display: none;">
    <input type="text" id="searchBar" placeholder="Buscar animes..." onfocus="this.classList.add('focused')" onblur="this.classList.remove('focused')" oninput="filterAnimes()">
    <button class="search-close-btn" onclick="closeSearchBar()">×</button>
</div>

<!-- Catálogo A-Z -->
<div id="azCatalog">
    <!-- Gerado via JavaScript -->
</div>

<!-- Menu de Gêneros (Escondido por padrão) -->
<div id="generosMenu" class="modal" style="display: none; align-items: flex-start; justify-content: flex-start;">
    <div class="modal-card" style="width: 280px; max-width: 80%; border-radius: 0 15px 15px 0;">
        <button class="close-btn" onclick="toggleGenerosMenu()">&times;</button>
        <h3 style="color:var(--primary); margin: 0 0 20px 0;">Gêneros</h3>
        <div id="generosList" class="flex-col gap-2">
            <!-- Gêneros serão carregados aqui pelo JavaScript -->
        </div>
    </div>
</div>

<!-- Conteúdo principal do site -->
<main>
    <section class="content-section">
        <div class="section-header">
            <h2>MAIS VOTADOS & ASSISTIDOS</h2>
            <a href="#" class="see-more-btn">VER MAIS</a>
        </div>
        <div class="anime-grid" id="highlightedAnimesGrid">
            <!-- Animes mais votados e assistidos serão carregados aqui -->
        </div>
    </section>

    <section class="content-section">
        <div class="section-header">
            <h2>ADICIONADOS RECENTEMENTE</h2>
            <a href="#" class="see-more-btn">VER MAIS</a>
        </div>
        <div class="anime-grid" id="recentAnimesGrid">
            <!-- Animes adicionados recentemente serão carregados aqui -->
        </div>
    </section>

        <!-- Modal para Postar Anime (Nova estrutura para Série) -->
    <div id="postarModal" class="modal">
        <div class="modal-card">

<script>
    // 1. CONFIGURAÇÃO DO FIREBASE (SEUS DADOS DE PROJETO)
    const firebaseConfig = { 
      apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw",

    // 2. INICIALIZAÇÃO DO FIREBASE
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth(); 
    const storage = firebase.storage(); // Inicializa o Firebase Storage

    let currentUserData = null; // Para armazenar os dados do usuário logado e seus settings
    let currentFilter = 'recentes'; // Filtro de animes atual (recentes, legendados, dublados, salvos)
    let currentPlayingSerie = null; // Armazena a ID da série atualmente no player
    let currentPlayingEpisode = null; // Armazena o ID do episódio atualmente no player
    let currentPlayingPlayerIndex = 0; // Index do player atual (se houver múltiplos)

    const allGeneros = [
        "Ação", "Aventura", "Comédia", "Drama", "Fantasia", "Ficção Científica", "Horror", "Mistério", "Romance", "Slice of Life",
        "Esporte", "Música", "Mecha", "Guerra", "Histórico", "Samurai", "Superpoderes", "Magia", "Vampiros", "Demônios",
        "Isekai", "Shounen", "Shoujo", "Seinen", "Josei", "Kodomomuke", "Yaoi", "Yuri", "Ecchi", "Hentai"
    ]; // Lista completa de gêneros

    // Helper para exibir mensagens de erro/sucesso
    function showMessage(message, type = 'alert') {
        alert(message); // Por simplicidade, usando alert. Em uma app real, use um modal/toast.
    }

        // Função para ajustar a luminosidade do site
    function ajustarLuminosidade(value) {
        const body = document.body;
        // Ajusta o brilho do body (ou de um container principal)
        // 100% é normal, 50% mais escuro, 150% mais claro
        body.style.filter = `brightness(${value}%)`;
    }

    // Funções para a barra de pesquisa
    let searchBarVisible = false;
    function toggleSearchBar() {
        const searchContainer = document.getElementById('searchContainer');
        if (searchBarVisible) {
            searchContainer.style.display = 'none';
            document.getElementById('searchBar').value = ''; // Limpa a busca ao fechar
            // Recarrega os animes se a barra de pesquisa for fechada
            if (currentFilter === 'search') {
                carregarAnimes('recentes'); // Volta para recentes se estava buscando
            }
        } else {
            searchContainer.style.display = 'flex';
            document.getElementById('searchBar').focus(); // Foca na barra de pesquisa
        }
        searchBarVisible = !searchBarVisible;
    }

    function closeSearchBar() {
        document.getElementById('searchContainer').style.display = 'none';
        document.getElementById('searchBar').value = '';
        document.getElementById('searchBar').classList.remove('focused');
        searchBarVisible = false;
        // Se a barra de pesquisa for fechada, recarrega os animes para o filtro anterior
        if (currentFilter === 'search') {
            carregarAnimes('recentes');
        }
    }

    // Função para filtrar animes (será chamada ao digitar na barra de pesquisa)
    async function filterAnimes() {
        const searchTerm = document.getElementById('searchBar').value.toLowerCase();
        if (searchTerm.length > 0) {
            currentFilter = 'search';
            const highlightedGrid = document.getElementById('highlightedAnimesGrid');
            const recentGrid = document.getElementById('recentAnimesGrid');
            highlightedGrid.innerHTML = ''; // Limpa os grids existentes
            recentGrid.innerHTML = '<h2>Buscando Animes...</h2>';

            try {
                // Busca por séries que contenham o termo de pesquisa no nome ou biografia
                const seriesSnapshot = await db.collection("series")
                                                .where('nomeLowerCase', '>=', searchTerm)
                                                .where('nomeLowerCase', '<=', searchTerm + '\uf8ff')
                                                .get();
                
                recentGrid.innerHTML = ''; // Limpa a mensagem de busca

                if (seriesSnapshot.empty) {
                    recentGrid.innerHTML = '<p>Nenhuma série encontrada para sua busca.</p>';
                    return;
                }

                seriesSnapshot.forEach(doc => {
                    const serie = { id: doc.id, ...doc.data() };
                    // Aplica a lógica de modo adulto para exibição
                    if (serie.isAdult && (!auth.currentUser || !currentUserData || !currentUserData.modoAdulto)) {
                        return; // Não exibe se for adulto e modo adulto desativado
                    }
                    displaySerieCard(recentGrid, serie);
                });

            } catch (error) {
                console.error("Erro ao buscar animes:", error);
                recentGrid.innerHTML = '<p>Erro ao buscar animes.</p>';
                showMessage("Erro ao buscar animes: " + error.message);
            }
        } else {
            // Se a busca estiver vazia, volta a exibir animes recentes
            currentFilter = 'recentes';
            carregarAnimes('recentes');
        }
    }

    // Função para gerar o catálogo A-Z
    function generateAZCatalog() {
        const azCatalogDiv = document.getElementById('azCatalog');
        azCatalogDiv.innerHTML = ''; // Limpa antes de gerar
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        
        // Adiciona um item para números e símbolos se desejar
        // azCatalogDiv.innerHTML += `<span onclick="filterByLetter('#')">#</span>`; 

        for (let i = 0; i < alphabet.length; i++) {
            const letter = alphabet[i];
            const span = document.createElement('span');
            span.textContent = letter;
            span.onclick = () => filterByLetter(letter);
            azCatalogDiv.appendChild(span);
        }
    }

    // Função para filtrar animes por letra inicial
    async function filterByLetter(letter) {
        currentFilter = 'letter';
        const highlightedGrid = document.getElementById('highlightedAnimesGrid');
        const recentGrid = document.getElementById('recentAnimesGrid');
        highlightedGrid.innerHTML = '';
        recentGrid.innerHTML = `<h2>Animes começando com '${letter}'...</h2>`;

        try {
            const seriesSnapshot = await db.collection("series")
                                            .where('nomeLowerCase', '>=', letter.toLowerCase())
                                            .where('nomeLowerCase', '<=', letter.toLowerCase() + '\uf8ff')
                                            .get();
            
            recentGrid.innerHTML = '';

            if (seriesSnapshot.empty) {
                recentGrid.innerHTML = `<p>Nenhum anime encontrado começando com '${letter}'.</p>`;
                return;
            }

            seriesSnapshot.forEach(doc => {
                const serie = { id: doc.id, ...doc.data() };
                if (serie.isAdult && (!auth.currentUser || !currentUserData || !currentUserData.modoAdulto)) {
                    return;
                }
                displaySerieCard(recentGrid, serie);
            });

        } catch (error) {
            console.error("Erro ao filtrar animes por letra:", error);
            recentGrid.innerHTML = '<p>Erro ao carregar animes por letra.</p>';
            showMessage("Erro ao carregar animes por letra: " + error.message);
        }
    }

    // Função para alternar o menu de gêneros
    let generosMenuOpen = false;
    function toggleGenerosMenu() {
        const generosMenu = document.getElementById('generosMenu');
        if (generosMenuOpen) {
            generosMenu.style.display = 'none';
        } else {
            generosMenu.style.display = 'flex';
            loadGenerosList(); // Carrega a lista de gêneros quando abre
        }
        generosMenuOpen = !generosMenuOpen;
    }

    // Função para carregar a lista de gêneros no menu
    function loadGenerosList() {
        const generosListDiv = document.getElementById('generosList');
        generosListDiv.innerHTML = ''; // Limpa a lista existente

        allGeneros.forEach(genero => {
            const generoItem = document.createElement('p');
            generoItem.textContent = genero;
            generoItem.classList.add('menu-item-white'); // Classe de estilo
            generoItem.onclick = () => filterByGenero(genero);
            generosListDiv.appendChild(generoItem);
        });
    }

    // Função para filtrar animes por gênero
    async function filterByGenero(genero) {
        currentFilter = 'genero';
        toggleGenerosMenu(); // Fecha o menu de gêneros
        const highlightedGrid = document.getElementById('highlightedAnimesGrid');
        const recentGrid = document.getElementById('recentAnimesGrid');
        highlightedGrid.innerHTML = '';
        recentGrid.innerHTML = `<h2>Animes do gênero: '${genero}'...</h2>`;

        try {
            // Busca séries onde o array de gêneros contém o gênero selecionado
            const seriesSnapshot = await db.collection("series")
                                            .where('generos', 'array-contains', genero)
                                            .get();
            
            recentGrid.innerHTML = '';

            if (seriesSnapshot.empty) {
                recentGrid.innerHTML = `<p>Nenhum anime encontrado para o gênero '${genero}'.</p>`;
                return;
            }

            seriesSnapshot.forEach(doc => {
                const serie = { id: doc.id, ...doc.data() };
                if (serie.isAdult && (!auth.currentUser || !currentUserData || !currentUserData.modoAdulto)) {
                    return;
                }
                displaySerieCard(recentGrid, serie);
            });

        } catch (error) {
            console.error("Erro ao filtrar animes por gênero:", error);
            recentGrid.innerHTML = '<p>Erro ao carregar animes por gênero.</p>';
            showMessage("Erro ao carregar animes por gênero: " + error.message);
        }
    }

    // Função para abrir o modal de postar anime (nova série)
    function openPostAnimeModal() {
        if (!auth.currentUser) {
            showMessage("Você precisa estar logado para postar animes!");
            document.getElementById('authModal').style.display = 'flex';
            return;
        }
        document.getElementById('postarModal').style.display = 'flex';
    }

    // Função para postar uma nova série e seu primeiro episódio
    async function postarNovaSerie() {
        const animeNome = document.getElementById('pAnimeNome').value;
        const capaSerie = document.getElementById('pCapaSerie').value;
        const biografia = document.getElementById('pBiografia').value;
        const generosInput = document.getElementById('pGeneros').value;
        const isAdultSerie = document.getElementById('pIsAdultSerie').checked;

        const nomeEpisodio = document.getElementById('pNomeEpisodio').value;
        const capaEpisodio = document.getElementById('pCapaEpisodio').value;
        const linkEpisodio = document.getElementById('pLinkEpisodio').value;
        const typeEpisodio = document.getElementById('pTypeEpisodio').value;

        if (!animeNome || !capaSerie || !biografia || !generosInput || !nomeEpisodio || !capaEpisodio || !linkEpisodio) {
            showMessage("Por favor, preencha todos os campos da série e do primeiro episódio.");
            return;
        }

        const generosArray = generosInput.split(',').map(g => g.trim()).filter(g => g !== '');

        if (generosArray.some(g => !allGeneros.includes(g))) {
            showMessage("Um ou mais gêneros informados não são válidos. Por favor, use os gêneros pré-definidos.");
            return;
        }

        try {
            const newSerieRef = await db.collection("series").add({
                nome: animeNome,
                nomeLowerCase: animeNome.toLowerCase(), // Para busca
                capa: capaSerie,
                biografia: biografia,
                generos: generosArray,
                isAdult: isAdultSerie,
                postedBy: auth.currentUser.uid,
                dataCriacao: firebase.firestore.FieldValue.serverTimestamp(),
                mediaAvaliacao: 0, // Inicia com 0
                totalAvaliacoes: 0,
                visualizacoes: 0,
            });

            // Adiciona o primeiro episódio como uma subcoleção da série
            await newSerieRef.collection("episodios").add({
                numero: 1, // Assumindo que este é o primeiro episódio
                nome: nomeEpisodio,
                capa: capaEpisodio,
                links: [{ url: linkEpisodio, type: typeEpisodio }], // Pode ter múltiplos links para o mesmo episódio (player 1, player 2)
                dataPostagem: firebase.firestore.FieldValue.serverTimestamp(),
                postedBy: auth.currentUser.uid,
                isAdult: isAdultSerie, // Herda do anime, mas pode ser sobrescrito
            });

            showMessage("Série e primeiro episódio postados com sucesso!");
            document.getElementById('postarModal').style.display = 'none';
            // Limpa formulário
            document.getElementById('pAnimeNome').value = '';
            document.getElementById('pCapaSerie').value = '';
            document.getElementById('pBiografia').value = '';
            document.getElementById('pGeneros').value = '';
            document.getElementById('pIsAdultSerie').checked = false;
            document.getElementById('pNomeEpisodio').value = '';
            document.getElementById('pCapaEpisodio').value = '';
            document.getElementById('pLinkEpisodio').value = '';
            document.getElementById('pTypeEpisodio').value = 'legendado';

            carregarAnimes('recentes'); // Recarrega para mostrar a nova série
        } catch (e) {
            console.error("Erro ao postar nova série:", e); 
            showMessage("Erro do Firebase: " + e.message + "\n\nVerifique as 'Regras' no Firebase e os dados inseridos!");
        }
    }

    // Função para adicionar um episódio a uma série existente
    async function addEpisodeToSerie() {
        const serieId = document.getElementById('addEpisodeModal').dataset.serieId;
        const nomeEpisodio = document.getElementById('addEpNome').value;
        const capaEpisodio = document.getElementById('addEpCapa').value;
        const linkEpisodio = document.getElementById('addEpLink').value;
        const typeEpisodio = document.getElementById('addEpType').value;

        if (!nomeEpisodio || !capaEpisodio || !linkEpisodio) {
            showMessage("Por favor, preencha todos os campos do episódio.");
            return;
        }

        try {
            // Primeiro, precisamos descobrir o próximo número de episódio
            const episodiosSnapshot = await db.collection("series").doc(serieId).collection("episodios")
                                                .orderBy("numero", "desc")
                                                .limit(1)
                                                .get();
            let proximoNumero = 1;

    async function uploadProfilePicture(event) {
        const file = event.target.files[0];
        if (!file) {
            return;
        }

        if (!auth.currentUser) {
            showMessage("Você precisa estar logado para alterar a foto de perfil.");
            return;
        }

        const storageRef = storage.ref();
        const profilePicRef = storageRef.child(`profile_pictures/${auth.currentUser.uid}/${file.name}`);

        try {
            const snapshot = await profilePicRef.put(file);
            const downloadURL = await snapshot.ref.getDownloadURL();

            await auth.currentUser.updateProfile({ photoURL: downloadURL });
            await db.collection("users").doc(auth.currentUser.uid).update({ photoURL: downloadURL });

            document.getElementById('profileImage').src = downloadURL;
            showMessage("Foto de perfil atualizada com sucesso!");
        } catch (error) {
            console.error("Erro ao fazer upload da foto de perfil:", error);
            showMessage("Erro ao fazer upload da foto: " + error.message);
        }
    }

    // Função para exibir animes com base no filtro (agora para séries)
    async function filterAnimesByStatus(filtro) { // 'legendado', 'dublado', 'assistidos', 'salvos'
        currentFilter = filtro;
        document.getElementById('userMenu').classList.remove('open'); // Fecha o menu
        document.getElementById('userMenu').style.display = 'none';

        const highlightedGrid = document.getElementById('highlightedAnimesGrid');
        const recentGrid = document.getElementById('recentAnimesGrid');
        highlightedGrid.innerHTML = ''; // Limpa os grids principais
        recentGrid.innerHTML = `<h2>Carregando Animes ${filtro}...</h2>`;

        let seriesQuery = db.collection("series");

        if (filtro === 'legendado' || filtro === 'dublado') {
            // Para filtrar por tipo, precisamos olhar os episódios ou ter um campo na série
            // Por simplicidade, vamos filtrar as séries que tem pelo menos um episódio daquele tipo.
            // Isso é mais complexo com Firestore pois não há 'OR' direto entre arrays.
            // Para este exemplo, vamos considerar que a série 'tem' ou 'não tem' esses tipos,
            // ou faremos uma busca mais ampla e depois filtramos localmente.
            // Uma solução melhor seria ter um campo 'temLegendado' ou 'temDublado' na série.
            // Por enquanto, vamos carregar tudo e filtrar no front-end, ou buscar por tags de gênero/tipo
            // que seriam adicionadas ao criar a série, por exemplo.
            // Para simplicidade, vamos buscar por todos e filtrar nos detalhes do card.
            recentGrid.innerHTML = '<p>Funcionalidade de filtro por "legendado" ou "dublado" para todas as séries será implementada em breve. Exibindo todos os recentes por enquanto.</p>';
            seriesQuery = seriesQuery.orderBy("dataCriacao", "desc"); // Volta para recentes
        } else if (filtro === 'salvos') {
            if (!auth.currentUser || !currentUserData || !currentUserData.animesSalvos || currentUserData.animesSalvos.length === 0) {
                recentGrid.innerHTML = '<p>Você não possui animes salvos ou não está logado.</p>';
                return;
            }
            // Para "animes salvos", precisamos buscar cada série individualmente
            const savedSeriesPromises = currentUserData.animesSalvos.map(serieId => db.collection("series").doc(serieId).get());
            const savedSeriesSnapshots = await Promise.all(savedSeriesPromises);
            
            recentGrid.innerHTML = '';
            savedSeriesSnapshots.forEach(doc => {
                if (doc.exists) {
                    const serie = { id: doc.id, ...doc.data() };
                    // Aplica as mesmas verificações de adulto que o filtro geral
                    if (serie.isAdult && (!auth.currentUser || !currentUserData.modoAdulto)) {
                        return; // Não exibe se for adulto e o modo adulto não estiver ativo
                    }
                    displaySerieCard(recentGrid, serie);
                }
            });
            if (recentGrid.innerHTML === '') {
                recentGrid.innerHTML = '<p>Nenhum anime salvo corresponde aos seus critérios de visualização.</p>';
            }
            return; // Termina a função aqui para animes salvos
        } else if (filtro === 'assistidos') {
            recentGrid.innerHTML = '<p>Funcionalidade de "animes assistidos" será implementada em breve. Exibindo todos os recentes por enquanto.</p>';
            seriesQuery = seriesQuery.orderBy("dataCriacao", "desc"); // Volta para recentes
        }
        
        try {
            const seriesSnapshot = await seriesQuery.get();
            recentGrid.innerHTML = ''; // Limpa a mensagem de carregamento

            if (seriesSnapshot.empty) {
                recentGrid.innerHTML = '<p>Nenhuma série encontrada.</p>';
                return;
            }

            seriesSnapshot.forEach(doc => {
                const serie = { id: doc.id, ...doc.data() };
                // Lógica de filtragem do modo adulto no front-end
                if (serie.isAdult && (!auth.currentUser || !currentUserData || !currentUserData.modoAdulto)) {
                    return; 
                }
                displaySerieCard(recentGrid, serie);
            });

        } catch (error) {
            console.error("Erro ao carregar séries:", error);
            recentGrid.innerHTML = '<p>Erro ao carregar séries.</p>';
            showMessage("Erro ao carregar séries: " + error.message);
        }
    }

            const serieDoc = await db.collection("series").doc(serieId).get();

                abrirVideoModal(currentPlayingSerie, prevEpisode);
            } else {
                showMessage("Este é o primeiro episódio.");
            }
        } catch (error) {
            console.error("Erro ao carregar episódio anterior:", error);
            showMessage("Erro ao carregar episódio anterior.");
        }
    }

    // Função para navegar para o próximo episódio
    async function nextEpisode() {
        if (!currentPlayingSerie || !currentPlayingEpisode) return;

        try {
            const episodiosSnapshot = await db.collection("series").doc(currentPlayingSerie.id).collection("episodios")
                                                .where("numero", ">", currentPlayingEpisode.numero)
                                                .orderBy("numero", "asc")
                                                .limit(1)
                                                .get();
            if (!episodiosSnapshot.empty) {
                const nextEpisode = { id: episodiosSnapshot.docs[0].id, ...episodiosSnapshot.docs[0].data() };
                abrirVideoModal(currentPlayingSerie, nextEpisode);
            } else {
                showMessage("Este é o último episódio.");
            }
        } catch (error) {
            console.error("Erro ao carregar próximo episódio:", error);
            showMessage("Erro ao carregar próximo episódio.");
        }
    }

    // Função para abrir o modal com a lista de episódios
    async function openEpisodeListModal() {
        if (!currentPlayingSerie) return;

        const episodeListModal = document.getElementById('episodeListModal');
        const episodeListModalTitle = document.getElementById('episodeListModalTitle');
        const episodeListContent = document.getElementById('episodeListContent');

        episodeListModalTitle.textContent = currentPlayingSerie.nome;
        episodeListContent.innerHTML = ''; // Limpa antes de carregar

        try {
            const episodiosSnapshot = await db.collection("series").doc(currentPlayingSerie.id).collection("episodios")
                                                .orderBy("numero", "asc")
                                                .get();
            
            if (episodiosSnapshot.empty) {
                episodeListContent.innerHTML = '<p>Nenhum episódio encontrado para esta série.</p>';
                return;
            }

            // Exibe a capa principal da série e biografia acima da lista de episódios
            const serieDetailsDiv = document.createElement('div');
            serieDetailsDiv.innerHTML = `
                <img src="${currentPlayingSerie.capa}" alt="${currentPlayingSerie.nome}" style="width: 100%; border-radius: 8px; margin-bottom: 15px;">
                <p style="text-align: left; margin-bottom: 15px;">${currentPlayingSerie.biografia}</p>
                <div class="genres" style="text-align: left; margin-bottom: 20px;">
                    ${currentPlayingSerie.generos.map(g => `<span>${g}</span>`).join('')}
                </div>
            `;
            episodeListContent.appendChild(serieDetailsDiv);

                        // Adiciona a opção de postar novo episódio (para usuários logados)
            if (auth.currentUser) {
                const addEpisodeBtn = document.createElement('button');
                addEpisodeBtn.textContent = 'Adicionar Novo Episodio';
                addEpisodeBtn.classList.add('btn-post');
                addEpisodeBtn.onclick = () => {
                    document.getElementById('episodeListModal').style.display = 'none'; // Fecha o modal de lista
                    openAddEpisodeModal(currentPlayingSerie.id, currentPlayingSerie.nome);
                };
                episodeListContent.appendChild(addEpisodeBtn);
                const hr = document.createElement('hr');
                hr.style.borderColor = '#333';
                hr.style.margin = '15px 0';
                episodeListContent.appendChild(hr);
            }

            episodiosSnapshot.forEach(doc => {
                const episodio = { id: doc.id, ...doc.data() };
                const episodeBtn = document.createElement('button');
                episodeBtn.textContent = `Episodio ${episodio.numero} - ${episodio.nome}`;
                episodeBtn.onclick = () => {
                    abrirVideoModal(currentPlayingSerie, episodio);
                    episodeListModal.style.display = 'none'; // Fecha o modal após selecionar
                };
                episodeListContent.appendChild(episodeBtn);
            });

            episodeListModal.style.display = 'flex';

        } catch (error) {
            console.error("Erro ao carregar lista de episódios:", error);
            episodeListContent.innerHTML = '<p>Erro ao carregar lista de episódios.</p>';
            showMessage("Erro ao carregar lista de episódios.");
        }
    }


    // Função para salvar/remover anime da lista do usuário
    async function toggleSalvarAnime() {
        if (!auth.currentUser || !currentUserData) {
            showMessage("Você precisa estar logado para salvar animes!");
            document.getElementById('videoModal').style.display = 'none'; // Fecha o player
            document.getElementById('authModal').style.display = 'flex'; // Abre o modal de login
            return;
        }

        if (!currentPlayingSerie) {
            showMessage("Nenhuma série selecionada para salvar/remover.");
            return;
        }

        const serieId = currentPlayingSerie.id;
        const animesSalvos = currentUserData.animesSalvos || [];
        const btnSalvarAnime = document.getElementById('btnSalvarAnime');

        try {
            if (animesSalvos.includes(serieId)) {
                // Remover
                const updatedAnimesSalvos = animesSalvos.filter(id => id !== serieId);
                await db.collection("users").doc(auth.currentUser.uid).update({ animesSalvos: updatedAnimesSalvos });
                currentUserData.animesSalvos = updatedAnimesSalvos;
                btnSalvarAnime.textContent = "Adicionar à Lista";
                btnSalvarAnime.classList.remove('saved');
                showMessage(`"${currentPlayingSerie.nome}" removido dos seus animes salvos.`);
            } else {
                // Adicionar
                const updatedAnimesSalvos = [...animesSalvos, serieId];
                await db.collection("users").doc(auth.currentUser.uid).update({ animesSalvos: updatedAnimesSalvos });
                currentUserData.animesSalvos = updatedAnimesSalvos;
                btnSalvarAnime.textContent = "Remover da Lista";
                btnSalvarAnime.classList.add('saved');
                showMessage(`"${currentPlayingSerie.nome}" adicionado à sua lista!`);
            }
        } catch (error) {
            console.error("Erro ao atualizar animes salvos:", error);
            showMessage("Erro ao salvar/remover anime: " + error.message);
        }
    }

    // Função para reportar erro (simples, apenas um showMessage por enquanto)
    async function reportarErro() {
        if (!auth.currentUser) {
            showMessage("Você precisa estar logado para reportar erros.");
            return;
        }
        if (!currentPlayingSerie || !currentPlayingEpisode) {
            showMessage("Nenhum episódio selecionado para reportar.");
            return;
        }

        const confirmReport = confirm(`Deseja reportar um erro no episódio "${currentPlayingEpisode.nome}" da série "${currentPlayingSerie.nome}"?`);
        if (confirmReport) {
            try {
                await db.collection("reports").add({
                    serieId: currentPlayingSerie.id,
                    episodeId: currentPlayingEpisode.id,
                    reportedBy: auth.currentUser.uid,
                    reportedEmail: auth.currentUser.email,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'pendente',
                    description: `Erro reportado no player ${currentPlayingPlayerIndex + 1} (${currentPlayingEpisode.links[currentPlayingPlayerIndex].type}) do episódio ${currentPlayingEpisode.numero}.`
                });
                showMessage("Erro reportado com sucesso! Agradecemos sua colaboração.");
            } catch (error) {
                console.error("Erro ao registrar o reporte:", error);
                showMessage("Não foi possível registrar o reporte. Tente novamente mais tarde.");
            }
        }
    }

    // Funções de Comentários
    async function loadComments(serieId, episodeId) {
        const commentsListDiv = document.getElementById('commentsList');
        commentsListDiv.innerHTML = 'Carregando comentários...';

        try {
            const commentsSnapshot = await db.collection("series").doc(serieId).collection("episodios").doc(episodeId).collection("comments")
                                                .orderBy("timestamp", "asc")
                                                .get();
            
            commentsListDiv.innerHTML = '';
            if (commentsSnapshot.empty) {
                commentsListDiv.innerHTML = '<p>Nenhum comentário ainda. Seja o primeiro a comentar!</p>';
                return;
            }

            commentsSnapshot.forEach(doc => {
                const comment = doc.data();
                const commentItem = document.createElement('div');
                commentItem.className = 'comment-item';
                commentItem.innerHTML = `
                    <p class="comment-author">${comment.userName || 'Usuário Anônimo'}:</p>
                    <p class="comment-text">${comment.text}</p>
                    ${auth.currentUser ? `<div class="comment-actions"><button onclick="replyToComment('${doc.id}', '${comment.userName || 'Usuário Anônimo'}')">Responder</button></div>` : ''}
                `;
                commentsListDiv.appendChild(commentItem);
            });

        } catch (error) {
            console.error("Erro ao carregar comentários:", error);
            commentsListDiv.innerHTML = '<p>Erro ao carregar comentários.</p>';
        }
    }

    async function postComment() {
        if (!auth.currentUser || !currentUserData) {
            showMessage("Você precisa estar logado para comentar.");
            return;
        }
        if (!currentPlayingSerie || !currentPlayingEpisode) {
            showMessage("Nenhum episódio selecionado para comentar.");
            return;
        }

        const commentInput = document.getElementById('commentInput');
        const commentText = commentInput.value.trim();

        if (commentText === '') {
            showMessage("Por favor, escreva um comentário.");
            return;
        }

        try {
            await db.collection("series").doc(currentPlayingSerie.id).collection("episodios").doc(currentPlayingEpisode.id).collection("comments").add({
                userId: auth.currentUser.uid,
                userName: auth.currentUser.displayName || auth.currentUser.email,
                text: commentText,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            });

            commentInput.value = ''; // Limpa o campo de texto
            showMessage("Comentário postado com sucesso!");
            loadComments(currentPlayingSerie.id, currentPlayingEpisode.id); // Recarrega os comentários
        } catch (error) {
            console.error("Erro ao postar comentário:", error);
            showMessage("Erro ao postar comentário: " + error.message);
        }
    }

    function replyToComment(commentId, userName) {
        const commentInput = document.getElementById('commentInput');
        commentInput.value = `@${userName} `;
        commentInput.focus();
    }

    // Monitorar o estado de autenticação para atualizar a UI
    auth.onAuthStateChanged(user => {
        if (user) {
            console.log("Usuário logado:", user.email);
            // Carrega os dados do usuário e aplica as preferências (tema, modo adulto, luminosidade)
            carregarDadosUsuario(user.uid).then(() => {
                carregarAnimes(currentFilter); // Recarrega animes com base nas preferências do usuário
            });
            // Esconde/mostra o formulário de comentário
            document.getElementById('commentForm').style.display = 'flex';
            document.getElementById('commentLoginPrompt').style.display = 'none';
        } else {
            console.log("Usuário deslogado.");
            currentUserData = null; // Limpa os dados do usuário
            document.getElementById('userMenu').classList.remove('open'); // Esconde o menu
            document.getElementById('userMenu').style.display = 'none';
            aplicarTema('dark'); // Volta para o tema padrão (escuro)
            document.getElementById('luminosityRange').value = 100; // Reseta luminosidade
            ajustarLuminosidade(100); // Aplica luminosidade padrão
            document.getElementById('userInfoDisplay').innerHTML = ''; // Limpa info do usuário
            carregarAnimes('recentes'); // Mostra animes recentes (sem filtro de usuário)
            // Esconde/mostra o formulário de comentário
            document.getElementById('commentForm').style.display = 'none';
            document.getElementById('commentLoginPrompt').style.display = 'block';
        }
    });

    // Inicia o carregamento de animes e catálogo A-Z quando a página é carregada
    document.addEventListener('DOMContentLoaded', () => {
        generateAZCatalog();
        // Se já estiver logado (sessão persistente), onAuthStateChanged cuidará da primeira carga
        // Caso contrário, carrega animes recentes como default
        if (!auth.currentUser) {
            carregarAnimes('recentes');
        }
        // Aplica o tema padrão no carregamento inicial (será sobrescrito se houver preferência do usuário)
        aplicarTema('dark');
        ajustarLuminosidade(100);
    });
