<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimesOracle</title>
    
    <!-- BIBLIOTECAS FIREBASE -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --primary: #6200ea; --shadow: rgba(98, 0, 234, 0.8); --brightness: 100%; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; filter: brightness(var(--brightness)); transition: 0.3s; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; height: 60px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-weight: bold; color: var(--primary); font-size: 22px; flex-grow: 1; text-align: center; text-shadow: 0 0 10px var(--primary); }
        .icon-btn { font-size: 26px; cursor: pointer; background: none; border: none; color: var(--primary); }
        .side-menu { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: #111; z-index: 2000; transition: 0.4s; padding: 20px; border-right: 2px solid var(--primary); box-sizing: border-box; }
        .side-menu.active { left: 0; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-purple { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .grid-animes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 2px solid var(--primary); box-shadow: 0 0 10px var(--shadow); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <button class="icon-btn" onclick="document.getElementById('sideMenu').classList.toggle('active')">☰</button>
    <div class="logo">AnimesOracle</div>
    <button class="icon-btn" onclick="abrirPostar()">➕</button>
</header>

<div class="side-menu" id="sideMenu">
    <div id="authArea">
        <h3 style="color:var(--primary)">Login / Cadastro</h3>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button class="btn-purple" onclick="testarLogin()">ENTRAR / CADASTRAR</button>
    </div>
    <div id="profileArea" style="display:none">
        <p id="userMailDisplay"></p>
        <button onclick="firebase.auth().signOut(); location.reload();" style="color:red; background:none; border:none;">Sair</button>
    </div>
</div>

<div class="grid-animes" id="animeGrid"></div>

<script>
    // CONFIGURAÇÃO
    const firebaseConfig = { 
        apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw", 
        authDomain: "://firebaseapp.com", 
        projectId: "animesoracle-a60e9", 
        storageBucket: "animesoracle-a60e9.firebasestorage.app", 
        messagingSenderId: "751657326717", 
        appId: "1:751657326717:web:67ef63d01ffa3ad044f914" 
    };
    firebase.initializeApp(firebaseConfig);

    function testarLogin() {
        // ESSA LINHA PRECISA APARECER NA TELA
        alert("Botão clicado! Tentando falar com o Google...");

        const e = document.getElementById('email').value;
        const s = document.getElementById('password').value;

        if(!e || s.length < 6) return alert("E-mail inválido ou senha menor que 6 dígitos!");

        firebase.auth().signInWithEmailAndPassword(e, s)
            .then(() => alert("Logado com sucesso!"))
            .catch(err => {
                if(err.code === 'auth/user-not-found') {
                    firebase.auth().createUserWithEmailAndPassword(e, s)
                        .then(() => alert("Conta nova criada!"))
                        .catch(e2 => alert("Erro no cadastro: " + e2.message));
                } else {
                    alert("Erro do Google: " + err.message);
                }
            });
    }

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            document.getElementById('authArea').style.display = 'none';
            document.getElementById('profileArea').style.display = 'block';
            document.getElementById('userMailDisplay').innerText = user.email;
        }
    });

    firebase.firestore().collection("animes").orderBy("data", "desc").onSnapshot(snap => {
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = "";
        snap.forEach(doc => {
            const a = doc.data();
            grid.innerHTML += `<div class="card"><img src="${a.capa}"><div style="padding:5px; text-align:center;">${a.nome}</div></div>`;
        });
    });

    function abrirPostar() {
        if(!firebase.auth().currentUser) return alert("Faça login primeiro!");
        let n = prompt("Nome do Anime:");
        let c = prompt("Link da Capa (Imagem):");
        let l = prompt("Link do Vídeo:");
        if(n && c && l) {
            firebase.firestore().collection("animes").add({
                nome: n, capa: c, link: l, data: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert("Postado!"));
        }
    }
</script>
</body>
</html>
