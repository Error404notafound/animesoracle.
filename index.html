<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimesOracle</title>
    
    <!-- BIBLIOTECAS -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; }
        header { background: #000; padding: 15px; border-bottom: 2px solid #6200ea; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #6200ea; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        input { width: 80%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 5px; }
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #1a1a1a; border: 1px solid #6200ea; border-radius: 8px; padding-bottom: 5px; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <div style="color:#6200ea; font-weight:bold;">AnimesOracle</div>
    <button class="btn" onclick="document.getElementById('modalAuth').style.display='block'">LOGIN</button>
</header>

<!-- ÁREA DE LOGIN -->
<div id="modalAuth" style="display:none; padding: 20px; background: #111; border-bottom: 2px solid #6200ea;">
    <h3>Entrar ou Cadastrar</h3>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="pass" placeholder="Senha (6+ dígitos)">
    <br>
    <button class="btn" onclick="fazerLogin()">ACESSAR</button>
    <button onclick="document.getElementById('modalAuth').style.display='none'" style="background:none; color:gray; border:none; margin-left:10px;">Fechar</button>
    <p id="uStatus" style="color:#6200ea; font-size:12px;"></p>
</div>

<div id="grid">Carregando animes...</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw", 
        authDomain: "://firebaseapp.com", 
        projectId: "animesoracle-a60e9", 
        storageBucket: "animesoracle-a60e9.firebasestorage.app", 
        appId: "1:751657326717:web:67ef63d01ffa3ad044f914" 
    };

    // TENTA INICIAR O SITE
    try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // MOSTRAR ANIMES
        db.collection("animes").orderBy("data", "desc").onSnapshot(snap => {
            const g = document.getElementById('grid');
            g.innerHTML = "";
            snap.forEach(doc => {
                const a = doc.data();
                g.innerHTML += `<div class="card"><img src="${a.capa}"><div>${a.nome}</div></div>`;
            });
        });

        // MONITORAR USUÁRIO
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('uStatus').innerText = "Logado como: " + user.email;
                document.getElementById('modalAuth').style.display = 'none';
            }
        });

    } catch (e) {
        alert("Erro ao conectar. Tente usar os dados móveis (4G).");
    }

    async function fazerLogin() {
        const e = document.getElementById('email').value.trim();
        const s = document.getElementById('pass').value;

        if(!e || s.length < 6) return alert("E-mail ou senha (min. 6) inválidos!");

        firebase.auth().signInWithEmailAndPassword(e, s)
            .then(() => alert("Logado!"))
            .catch(err => {
                if(err.code === 'auth/user-not-found') {
                    firebase.auth().createUserWithEmailAndPassword(e, s)
                        .then(() => alert("Conta criada!"))
                        .catch(e2 => alert("Erro: " + e2.message));
                } else {
                    alert("Erro: " + err.message);
                }
            });
    }
</script>
</body>
</html>
