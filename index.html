<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimesOracle</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --primary: #6200ea; --brightness: 100%; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; filter: brightness(var(--brightness)); overflow-x: hidden; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; height: 60px; position: sticky; top: 0; z-index: 1000; }
        .header-btn-container { width: 45px; display: flex; align-items: center; }
        .logo { font-weight: bold; color: var(--primary); font-size: 20px; flex-grow: 1; text-align: center; }
        
        /* AJUSTE PARA O CLIQUE FUNCIONAR NOS BOTÕES VAZIOS */
        .icon-btn { width: 45px; height: 45px; cursor: pointer; background: rgba(255,255,255,0.01); border: none; color: var(--primary); padding: 0; display: block; }
        
        #searchBox { display: none; position: absolute; left: 0; top: 60px; width: 100%; padding: 10px; background: #000; box-sizing: border-box; z-index: 999; }
        #searchBox input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid var(--primary); background: #222; color: white; }
        .abc-menu { display: flex; overflow-x: auto; background: #111; padding: 12px; gap: 20px; scrollbar-width: none; border-bottom: 1px solid #222; -webkit-overflow-scrolling: touch; }
        .abc-menu::-webkit-scrollbar { display: none; }
        .abc-menu span { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 16px; min-width: 15px; text-align: center; cursor: pointer; }
        .side-menu { position: fixed; left: -100%; top: 0; width: 80%; max-width: 300px; height: 100%; background: #151515; z-index: 2000; transition: 0.3s; padding: 20px; }
        .side-menu.active { left: 0; }
        .profile-area { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .user-avatar { width: 70px; height: 70px; border-radius: 50%; background: #333; object-fit: cover; border: 2px solid var(--primary); }
        .nav-links a { display: block; color: white; padding: 15px 0; text-decoration: none; border-bottom: 1px solid #222; font-size: 14px; }
        .section-title { padding: 15px 10px 5px; font-size: 13px; color: #888; text-transform: uppercase; }
        .slider { display: flex; overflow-x: auto; gap: 12px; padding: 10px; scrollbar-width: none; }
        .featured-card { min-width: 140px; background: var(--card); border-radius: 8px; overflow: hidden; border: 2px solid var(--primary); box-shadow: 0 0 10px rgba(98, 0, 234, 0.2); position: relative; }
        .featured-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .grid-recent { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .card-recent { background: var(--card); border-radius: 8px; overflow: hidden; border-bottom: 2px solid var(--primary); }
        .card-recent img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; }
        .modal-card { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box;}
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; }
    </style>
</head>
<body>

<header>
    <div class="header-btn-container"><button class="icon-btn" onclick="toggleMenu()"></button></div>
    <div class="logo">AnimesOracle</div>
    <div class="header-btn-container" style="justify-content: flex-end; gap: 10px;">
        <button class="icon-btn" onclick="abrirPostar()"></button>
        <button class="icon-btn" onclick="toggleSearch()"></button>
    </div>
    <div id="searchBox"><input type="text" id="searchInput" placeholder="Pesquisar..."></div>
</header>

<div class="abc-menu" id="abcContainer"></div>

<div id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <div class="profile-area">
        <img src="https://flaticon.com" class="user-avatar" id="userPhoto">
        <h4 id="userNameDisplay">Visitante</h4>
        <button id="authBtn" onclick="fazerLogin()" style="background:var(--primary); border:none; color:white; padding:8px 15px; border-radius:4px; cursor:pointer;">Entrar / Cadastro</button>
    </div>
    <nav class="nav-links">
        <a href="#">Animes Dublados</a>
        <a href="#">Animes Legendados</a>
        <div id="loggedOptions" style="display:none; padding:10px;">
            <small>Brilho:</small>
            <input type="range" min="30" max="100" value="100" oninput="window.setBrilho(this.value)">
        </div>
    </nav>
</div>

<div id="postarModal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--primary); margin:0;">Postar Anime</h3>
        <input type="text" id="pNome" placeholder="Nome do Anime">
        <input type="text" id="pCapa" placeholder="Link da Capa (Imagem)">
        <input type="text" id="pLink" placeholder="Link do Vídeo">
        <button onclick="salvarPost()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">PUBLICAR</button>
        <button onclick="fecharPostar()" style="background:none; border:none; color:#666; width:100%; margin-top:10px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<div class="section-title">Destaques</div>
<div class="slider" id="sliderDestaques"></div>
<div class="section-title">Recentes</div>
<div class="grid-recent" id="gridRecent"></div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://gstatic.com";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc, getDoc } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyBlhgf82RL_uSWChpBwzuUAfi_SHtQY2kw",
        authDomain: "://firebaseapp.com",
        projectId: "animesoracle-a60e9",
        storageBucket: "animesoracle-a60e9.firebasestorage.app",
        messagingSenderId: "751657326717",
        appId: "1:751657326717:web:67ef63d01ffa3ad044f914"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Funções de Interface
    window.toggleMenu = () => {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sideMenu').classList.contains('active') ? 'block' : 'none';
    };
    window.toggleSearch = () => {
        const s = document.getElementById('searchBox');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    };
    window.setBrilho = (v) => document.documentElement.style.setProperty('--brightness', v + '%');
    window.abrirPostar = () => {
        if(!auth.currentUser) return alert("Faça login para postar!");
        document.getElementById('postarModal').style.display = 'flex';
    };
    window.fecharPostar = () => document.getElementById('postarModal').style.display = 'none';

    // Login Real
    window.fazerLogin = async () => {
        if(auth.currentUser) return signOut(auth);
        const e = prompt("E-mail:"), s = prompt("Senha (6+ dígitos):");
        if(!e || !s) return;
        try { await signInWithEmailAndPassword(auth, e, s); }
        catch {
            const n = prompt("Nome para cadastro:");
            if(n) {
                const r = await createUserWithEmailAndPassword(auth, e, s);
                await setDoc(doc(db, "usuarios", r.user.uid), { nome: n });
            }
        }
    };

    // Postagem Real
    window.salvarPost = async () => {
        const n = document.getElementById('pNome').value, c = document.getElementById('pCapa').value, l = document.getElementById('pLink').value;
        if(!n || !l) return alert("Nome e Link obrigatórios!");
        await addDoc(collection(db, "animes"), { nome: n, capa: c || 'https://placeholder.com', link: l, data: Date.now() });
        fecharPostar();
    };

    // Monitorar Usuário
    onAuthStateChanged(auth, async (u) => {
        const d = document.getElementById('userNameDisplay'), b = document.getElementById('authBtn'), o = document.getElementById('loggedOptions');
        if(u) {
            const docSnap = await getDoc(doc(db, "usuarios", u.uid));
            d.innerText = docSnap.exists() ? docSnap.data().nome : u.email;
            b.innerText = "Sair"; o.style.display = "block";
        } else { d.innerText = "Visitante"; b.innerText = "Entrar / Cadastro"; o.style.display = "none"; }
    });

    // Carregar Dados
    onSnapshot(query(collection(db, "animes"), orderBy("data", "desc")), (snap) => {
        const g = document.getElementById('gridRecent'), s = document.getElementById('sliderDestaques');
        g.innerHTML = ""; s.innerHTML = "";
        snap.forEach(doc => {
            const a = doc.data();
            g.innerHTML += `<div class="card-recent" onclick="window.open('${a.link}','_blank')"><img src="${a.capa}"><div style="padding:8px; font-size:12px;">${a.nome}</div></div>`;
            if(s.children.length < 5) s.innerHTML += `<div class="featured-card" onclick="window.open('${a.link}','_blank')"><img src="${a.capa}"></div>`;
        });
    });

    // Menu A-Z e Pesquisa
    const cont = document.getElementById('abcContainer');
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
        const span = document.createElement('span'); span.innerText = l;
        span.onclick = () => { document.getElementById('searchInput').value = l; document.getElementById('searchInput').dispatchEvent(new Event('input')); };
        cont.appendChild(span);
    });
    document.getElementById('searchInput').oninput = (e) => {
        const t = e.target.value.toLowerCase();
        document.querySelectorAll('.card-recent').forEach(c => c.style.display = c.innerText.toLowerCase().includes(t) ? 'block' : 'none');
    };
</script>
</body>
</html>
