<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnimesOracle - Plataforma de streaming de animes com Firebase">
    <title>AnimesOracle</title>
    
    <!-- FIREBASE SDK (VERSÃO ESTÁVEL 8.10.0) -->
    <!-- Essencial para o Firebase funcionar -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Para o banco de dados Firestore -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <!-- Para autenticação de usuários (e-mail/senha) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <!-- Para armazenamento de fotos de perfil -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        /* ========================================
           ESTILOS GLOBAIS E DO TEMA
           ======================================== */
        * {
            box-sizing: border-box;
        }

        :root { 
            --bg: #0f0f0f; 
            --card: #1a1a1a; 
            --text: #ffffff; 
            --primary: #6200ea;
            --primary-light: #9c27b0;
            --secondary-bg: #222;
            --highlight-glow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            --danger: #cc0000;
            --text-secondary: #888;
            --success: #4CAF50;
            --info: #007bff;
            --warning: #ffc107;
            --orange: #ffa500;
            --blur-strength: 10px;
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            transition: background-color 0.3s, color 0.3s, filter 0.3s;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Modo Claro */
        body.light-mode {
            --bg: #f0f0f0;
            --card: #ffffff;
            --text: #333333;
            --secondary-bg: #e0e0e0;
            --text-secondary: #666;
        }
        
        /* Modo Cinema */
        body.cinema-mode {
            overflow: hidden;
        }

        body.cinema-mode > :not(#videoModal) {
            filter: brightness(30%) blur(5px);
            transition: filter 0.3s ease-in-out;
            pointer-events: none;
        }

        body.cinema-mode #videoModal {
            filter: brightness(100%);
            z-index: 5001;
            pointer-events: all;
        }

        /* ========================================
           UTILIDADES
           ======================================== */
        .flex-row { display: flex; align-items: center; }
        .flex-col { display: flex; flex-direction: column; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .items-center { align-items: center; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }

        /* ========================================
           HEADER
           ======================================== */
        header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            background: #000; 
            height: 60px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333; 
        }

        .logo { 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 20px; 
            flex-grow: 1; 
            text-align: center;
        }

        .icon-btn { 
            font-size: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: var(--primary); 
            outline: none; 
            padding: 0 5px; 
            transition: color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            color: var(--primary-light);
            transform: scale(1.1);
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* ========================================
           BARRA DE PESQUISA
           ======================================== */
        .search-container {
            position: relative;
            width: 100%;
            display: none;
            justify-content: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            background: var(--bg);
            z-index: 999;
        }

        .search-container.active {
            display: flex;
        }

        #searchBar { 
            width: 90%; 
            max-width: 600px;
            padding: 12px 15px; 
            background: var(--secondary-bg); 
            border: 1px solid #333; 
            color: var(--text); 
            border-radius: 25px;
            box-sizing: border-box; 
            transition: box-shadow 0.3s ease-in-out, border-color 0.3s;
        }

        #searchBar:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--highlight-glow);
        }

        #searchBar::placeholder {
            color: #888;
        }

        .search-close-btn {
            position: absolute;
            right: 10%;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--danger);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            display: none;
        }

        .search-close-btn.active {
            display: block;
        }

        /* ========================================
           CATÁLOGO A-Z
           ======================================== */
        #azCatalog {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            justify-content: flex-start;
            padding: 5px 15px;
            background: var(--bg);
            border-bottom: 1px solid #333;
            z-index: 998;
            gap: 2px;
            font-size: 0.9em;
        }

        #azCatalog::-webkit-scrollbar {
            height: 5px;
        }

        #azCatalog::-webkit-scrollbar-track {
            background: var(--secondary-bg);
            border-radius: 10px;
        }

        #azCatalog::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        #azCatalog span {
            color: var(--primary);
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            padding: 2px 5px;
            transition: background-color 0.2s, color 0.2s;
            border-radius: 4px;
            flex-shrink: 0;
            user-select: none;
        }

        #azCatalog span:hover {
            background-color: var(--primary);
            color: var(--text);
        }

        /* ========================================
           HERO SLIDER
           ======================================== */
        #heroSlider {
            position: relative;
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 8px;
            aspect-ratio: 1280 / 574;
            border-bottom: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            cursor: pointer;
        }

        .hero-slide.active {
            opacity: 1;
        }

        .hero-slide-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.0) 50%, rgba(0,0,0,0.9) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .hero-slide-meta {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
            text-transform: capitalize;
        }

        .hero-slide-title {
            font-size: clamp(1.5em, 5vw, 2.5em);
            color: white;
            font-weight: bold;
            margin: 0;
            line-height: 1.2;
            text-align: left;
            max-height: 10%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }

        .hero-slider-pagination {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .pagination-dot {
            width: 8px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .pagination-dot.active {
            background-color: white;
        }

        /* ========================================
           CONTEÚDO PRINCIPAL
           ======================================== */
        .content-section {
            padding: 20px 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .section-header h2 {
            color: var(--text);
            font-size: 1.5em;
            margin: 0;
            padding-left: 10px;
            position: relative;
        }

        .section-header h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 80%;
            background-color: var(--primary);
            border-radius: 2px;
        }

        .see-more-btn {
            background-color: var(--primary);
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9em;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .see-more-btn:hover {
            background-color: var(--primary-light);
        }

        /* ========================================
           GRID DE ANIMES
           ======================================== */
        .anime-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 12px; 
        }

        .anime-grid.scrollable {
            display: flex;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 10px;
        }

        .anime-grid.scrollable .anime-card {
            flex-shrink: 0;
            width: 150px;
        }

        .anime-grid.scrollable::-webkit-scrollbar {
            height: 5px;
        }

        .anime-grid.scrollable::-webkit-scrollbar-track {
            background: var(--secondary-bg);
            border-radius: 10px;
        }

        .anime-grid.scrollable::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* ========================================
           CARDS DE ANIME
           ======================================== */
        .anime-card { 
            background: var(--card); 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #333; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            cursor: pointer;
        }

        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .anime-card img { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            display: block; 
        }

        .anime-card-info { 
            padding: 8px; 
            font-size: 13px; 
            font-weight: bold; 
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .anime-card .anime-genres {
            font-size: 0.75em;
            color: var(--text-secondary);
            padding: 0 8px 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .anime-card.highlighted {
            box-shadow: var(--highlight-glow);
            border-color: var(--primary);
        }

        .anime-card.highlighted::before {
            content: 'DESTAQUE';
            position: absolute;
            top: 0;
            left: 0;
            background-color: var(--primary);
            color: white;
            padding: 3px 6px;
            font-size: 0.7em;
            font-weight: bold;
            border-radius: 8px 0 8px 0;
            z-index: 10;
        }

        .anime-card .rating-badge {
            position: absolute;
            bottom: 45px;
            right: 5px;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--warning);
            padding: 3px 6px;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
            z-index: 10;
        }

        /* Conteúdo Adulto */
        .anime-card.adult-content-blurred {
            filter: blur(var(--blur-strength));
            pointer-events: none;
            position: relative;
        }

        .anime-card.adult-content-blurred::after {
            content: "Conteúdo +18";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
            text-align: center;
            z-index: 10;
            filter: none;
        }

        /* ========================================
           MODAIS
           ======================================== */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 5000; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
        }

        .modal-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px; 
            width: 85%; 
            max-width: 400px; 
            border: 1px solid var(--primary); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative; 
            overflow-y: auto;
            max-height: 90vh;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: var(--secondary-bg); 
            border: 1px solid #333; 
            color: var(--text); 
            border-radius: 5px; 
            box-sizing: border-box; 
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(98, 0, 234, 0.5);
        }

        .btn-post { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-post:hover {
            background-color: var(--primary-light);
            transform: translateY(-1px);
        }

        .cancel-btn {
            background: none; 
            color: gray; 
            border: none; 
            margin-top: 15px; 
            width: 100%; 
            cursor: pointer;
            transition: color 0.2s;
        }

        .cancel-btn:hover {
            color: var(--text);
        }

        /* ========================================
           MENU DO USUÁRIO
           ======================================== */
        #userMenu {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 5000;
            justify-content: flex-start;
            align-items: stretch;
        }

        #userMenu.open {
            display: flex;
        }

        #userMenu .modal-card {
            width: 280px;
            max-width: 80%;
            height: 100%;
            border-radius: 0 15px 15px 0;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            background: var(--card);
            max-height: 100vh;
        }

        #userMenu .close-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 10px;
            z-index: 5001;
        }

        #userInfoDisplay {
            text-align: center;
            margin-top: 30px;
        }

        #userInfoDisplay img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        #userInfoDisplay p {
            margin: 8px 0;
            padding: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s;
            color: var(--text);
        }

        #userInfoDisplay p:hover {
            background-color: var(--secondary-bg);
            border-radius: 5px;
        }

        /* ========================================
           RESPONSIVIDADE
           ======================================== */
        @media (max-width: 768px) {
            header {
                padding: 0 10px;
                height: 50px;
            }

            .logo {
                font-size: 16px;
            }

            .section-header h2 {
                font-size: 1.2em;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }

            .modal-card {
                width: 90%;
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 14px;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 8px;
            }

            .modal-card {
                padding: 15px;
            }

            #userMenu .modal-card {
                width: 100%;
                max-width: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <!-- ========================================
         HEADER
         ======================================== -->
    <header>
        <button class="icon-btn" id="btnMenu" aria-label="Abrir menu">☰</button>
        <h1 class="logo">AnimesOracle</h1>
        <button class="icon-btn" id="btnSearch" aria-label="Buscar animes">🔍</button>
    </header>

    <!-- ========================================
         BARRA DE PESQUISA
         ======================================== -->
    <div class="search-container" id="searchContainer">
        <input 
            type="text" 
            id="searchBar" 
            placeholder="Buscar animes..." 
            aria-label="Campo de busca de animes"
        >
        <button class="search-close-btn" id="searchCloseBtn" aria-label="Fechar busca">✕</button>
    </div>

    <!-- ========================================
         CATÁLOGO A-Z
         ======================================== -->
    <div id="azCatalog" role="navigation" aria-label="Catálogo de letras">
        <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span>
        <span>F</span><span>G</span><span>H</span><span>I</span><span>J</span>
        <span>K</span><span>L</span><span>M</span><span>N</span><span>O</span>
        <span>P</span><span>Q</span><span>R</span><span>S</span><span>T</span>
        <span>U</span><span>V</span><span>W</span><span>X</span><span>Y</span>
        <span>Z</span>
    </div>

    <!-- ========================================
         HERO SLIDER
         ======================================== -->
    <div id="heroSlider" role="region" aria-label="Destaques em destaque">
        <div class="hero-slide active">
            <div class="hero-slide-overlay">
                <div class="hero-slide-meta">Anime em Destaque</div>
                <h2 class="hero-slide-title">Seu Anime Favorito Aqui</h2>
            </div>
        </div>
        <div class="hero-slider-pagination"></div>
    </div>

    <!-- ========================================
         CONTEÚDO PRINCIPAL
         ======================================== -->
    <main>
        <section class="content-section">
            <div class="section-header">
                <h2>Populares Agora</h2>
                <button class="see-more-btn">Ver Mais</button>
            </div>
            <div class="anime-grid scrollable" id="popularesGrid"></div>
        </section>

        <section class="content-section">
            <div class="section-header">
                <h2>Em Lançamento</h2>
                <button class="see-more-btn">Ver Mais</button>
            </div>
            <div class="anime-grid scrollable" id="lancamentoGrid"></div>
        </section>

        <section class="content-section">
            <div class="section-header">
                <h2>Mais Votados</h2>
                <button class="see-more-btn">Ver Mais</button>
            </div>
            <div class="anime-grid" id="votadosGrid"></div>
        </section>
    </main>

    <!-- ========================================
         MENU DO USUÁRIO
         ======================================== -->
    <div id="userMenu" role="dialog" aria-label="Menu do usuário">
        <div class="modal-card">
            <button class="close-btn" id="closeUserMenu" aria-label="Fechar menu">✕</button>
            <div id="userInfoDisplay">
                <img src="https://via.placeholder.com/60" alt="Foto de perfil do usuário">
                <p class="menu-item-primary">Usuário não autenticado</p>
            </div>
        </div>
    </div>

    <!-- ========================================
         MODAL DE VÍDEO
         ======================================== -->
    <div id="videoModal" class="modal" role="dialog" aria-label="Player de vídeo">
        <div class="modal-card" id="videoPlayerModal">
            <button class="close-video-btn" id="closeVideoBtn" aria-label="Fechar player">✕</button>
            <h2 class="anime-title">Título do Anime</h2>
            <iframe 
                id="videoPlayer" 
                width="800" 
                height="450" 
                frameborder="0" 
                allowfullscreen
                aria-label="Player de vídeo do anime"
            ></iframe>
            <div class="player-content-scroll">
                <div class="player-details-section">
                    <h3>Sinopse</h3>
                    <p>Carregando...</p>
                </div>
                <div class="comments-section">
                    <h3>Comentários</h3>
                    <p>Nenhum comentário ainda.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================
         SCRIPTS PRINCIPAIS
         ======================================== -->
    <script>
        // ====================================
        // CONFIGURAÇÃO DO FIREBASE
        // ====================================
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "seu-projeto.firebaseapp.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "seu-sender-id",
            appId: "seu-app-id"
        };

        // Inicializar Firebase (apenas se configuração válida)
        try {
            if (firebaseConfig.apiKey && firebaseConfig.projectId) {
                firebase.initializeApp(firebaseConfig);
                console.log('✅ Firebase inicializado com sucesso');
            } else {
                console.warn('⚠️ Configuração Firebase incompleta');
            }
        } catch (error) {
            console.error('❌ Erro ao inicializar Firebase:', error);
        }

        // ====================================
        // ELEMENTOS DO DOM
        // ====================================
        const elements = {
            btnMenu: document.getElementById('btnMenu'),
            btnSearch: document.getElementById('btnSearch'),
            userMenu: document.getElementById('userMenu'),
            closeUserMenu: document.getElementById('closeUserMenu'),
            searchContainer: document.getElementById('searchContainer'),
            searchBar: document.getElementById('searchBar'),
            searchCloseBtn: document.getElementById('searchCloseBtn'),
            videoModal: document.getElementById('videoModal'),
            closeVideoBtn: document.getElementById('closeVideoBtn'),
            azCatalog: document.getElementById('azCatalog')
        };

        // ====================================
        // FUNÇÕES DE EVENTOS
        // ====================================

        /**
         * Configurar eventos do menu
         */
        function setupMenuEvents() {
            if (!elements.btnMenu || !elements.userMenu) return;

            elements.btnMenu.addEventListener('click', () => {
                elements.userMenu?.classList.add('open');
            });

            if (elements.closeUserMenu) {
                elements.closeUserMenu.addEventListener('click', () => {
                    elements.userMenu?.classList.remove('open');
                });
            }

            // Fechar menu ao clicar fora
            document.addEventListener('click', (e) => {
                if (elements.userMenu?.classList.contains('open') && 
                    !elements.userMenu?.contains(e.target) && 
                    e.target !== elements.btnMenu) {
                    elements.userMenu?.classList.remove('open');
                }
            });
        }

        /**
         * Configurar eventos de busca
         */
        function setupSearchEvents() {
            if (!elements.btnSearch) return;

            elements.btnSearch.addEventListener('click', () => {
                elements.searchContainer?.classList.add('active');
                elements.searchBar?.focus();
            });

            if (elements.searchCloseBtn) {
                elements.searchCloseBtn.addEventListener('click', () => {
                    elements.searchContainer?.classList.remove('active');
                    if (elements.searchBar) elements.searchBar.value = '';
                });
            }

            if (elements.searchBar) {
                elements.searchBar.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const query = elements.searchBar?.value;
                        console.log('🔍 Buscando:', query);
                        // Implementar lógica de busca aqui
                    }
                });
            }
        }

        /**
         * Configurar eventos do modal de vídeo
         */
        function setupVideoEvents() {
            if (!elements.closeVideoBtn || !elements.videoModal) return;

            elements.closeVideoBtn.addEventListener('click', () => {
                elements.videoModal?.classList.remove('active');
                document.body.classList.remove('cinema-mode');
            });

            // Fechar ao clicar no fundo do modal
            elements.videoModal.addEventListener('click', (e) => {
                if (e.target === elements.videoModal) {
                    elements.videoModal?.classList.remove('active');
                    document.body.classList.remove('cinema-mode');
                }
            });
        }

        /**
         * Abrir player de vídeo
         */
        function openVideoPlayer(videoUrl, title) {
            if (!elements.videoModal) return;
            
            const videoPlayer = document.getElementById('videoPlayer');
            if (videoPlayer) {
                videoPlayer.src = videoUrl;
            }

            const titleElement = document.querySelector('.anime-title');
            if (titleElement) {
                titleElement.textContent = title || 'Anime';
            }

            elements.videoModal.classList.add('active');
            document.body.classList.add('cinema-mode');
        }

        /**
         * Configurar catálogo A-Z
         */
        function setupAlphabetCatalog() {
            if (!elements.azCatalog) return;

            elements.azCatalog.addEventListener('click', (e) => {
                if (e.target.tagName === 'SPAN') {
                    const letter = e.target.textContent;
                    console.log('📚 Filtrando por letra:', letter);
                    // Implementar lógica de filtro aqui
                }
            });
        }

        /**
         * Carregar dados de animes
         */
        function loadAnimes() {
            console.log('📺 Carregando animes...');
            // Implementar carregamento de dados aqui
        }

        // ====================================
        // INICIALIZAÇÃO
        // ====================================
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ DOM carregado - AnimesOracle iniciando...');
            
            setupMenuEvents();
            setupSearchEvents();
            setupVideoEvents();
            setupAlphabetCatalog();
            loadAnimes();

            console.log('✅ AnimesOracle pronto para uso!');
        });

        // ====================================
        // EXPORTAR FUNÇÕES PÚBLICAS
        // ====================================
        window.AnimesOracle = {
            openVideoPlayer,
            loadAnimes
        };
    </script>
</body>
